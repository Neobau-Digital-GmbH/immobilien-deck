<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markt 2026</title>
<style>
:root {
  --bg:       oklch(0.98 0.005 85);
  --surface:  oklch(0.995 0.003 85);
  --ink:      oklch(0.18 0.02 250);
  --muted:    oklch(0.45 0.02 250);
  --subtle:   oklch(0.65 0.01 250);
  --border:   oklch(0.88 0.01 85);
  --accent:   oklch(0.55 0.13 160);
  --font:     "Roboto", system-ui, -apple-system, sans-serif;
  --mono:     ui-monospace, "SFMono-Regular", Menlo, monospace;
  --logo-header: clamp(22px, 2.6vh, 38px);
  /* Typo-Token Fallbacks */
  --fs-eyebrow:  clamp(9px, 0.75vw, 11px);
  --fs-headline: clamp(1.5rem, 2.5vw, 3rem);
  --fs-subline:  clamp(0.9rem, 1.1vw, 1.25rem);
  --fs-body:     clamp(0.85rem, 1vw, 1.12rem);
  --fs-label:    clamp(9px, 0.72vw, 11px);
  --fs-kpiLg:    clamp(1.8rem, 3.2vw, 3.8rem);
  --fs-kpiSm:    clamp(1.1rem, 1.9vw, 2.2rem);
  --fs-mono:     clamp(11px, 0.95vw, 14px);
  --fs-monoLg:   clamp(1.3rem, 2.1vw, 2.6rem);
  /* Slide-Standard-Abstände */
  --pad-v:       clamp(24px, 3.5vh, 48px);
  --pad-h:       clamp(28px, 3.5vw, 56px);
  --header-gap:  clamp(20px, 3.5vh, 44px);
  --content-gap: clamp(8px, 1.2vh, 16px);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh; overflow:hidden;
  background:var(--bg); font-family:var(--font);
  -webkit-font-smoothing:antialiased; color:var(--ink);
}
.slide {
  display:grid; grid-template-columns:36fr 64fr;
  width:100vw; height:100vh;
}

/* ── LINKE SPALTE ─────────────────────────────────────────── */
.col-left {
  display:flex; flex-direction:column;
  padding:var(--pad-v) var(--pad-h);
  position:relative; overflow:hidden;
  border-right:1px solid var(--border);
}
.col-left::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(oklch(0.84 0.005 85) 1.2px, transparent 1.2px);
  background-size:28px 28px;
  mask-image:linear-gradient(160deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,0) 55%);
  -webkit-mask-image:linear-gradient(160deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,0) 55%);
}
.col-left::after {
  content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:3px; border-radius:0 3px 3px 0;
  background:var(--accent); opacity:.5;
}

/* HEADER */
.header {
  position:relative; z-index:1; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:var(--header-gap);
}
.dev-logo   { height:var(--logo-header); width:auto; object-fit:contain; }
.slide-label {
  font-size:var(--fs-label); font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; color:var(--subtle);
}

/* CONTENT — startet oben, kein vertikales Zentrieren */
.content {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  gap:var(--content-gap);
  flex:1; min-height:0;
}

.eyebrow {
  display:flex; align-items:center; gap:8px; flex-shrink:0;
  font-size:var(--fs-eyebrow); font-weight:700;
  letter-spacing:.22em; text-transform:uppercase; color:var(--accent);
}
.eyebrow::before {
  content:''; width:clamp(14px, 1.6vw, 22px); height:2px;
  background:var(--accent); border-radius:2px; flex-shrink:0;
}
.headline {
  font-size:var(--fs-headline); font-weight:900;
  letter-spacing:-.025em; line-height:1.05; color:var(--ink);
  flex-shrink:0;
}
.subline {
  font-size:var(--fs-subline); font-weight:400;
  color:var(--muted); line-height:1.6; flex-shrink:0;
}

/* FOOTER */
.footer-left {
  position:relative; z-index:1; flex-shrink:0;
  margin-top:clamp(12px, 2vh, 24px);
  padding-top:clamp(10px, 1.5vh, 18px);
  border-top:1px solid var(--border);
}
.address { font-size:var(--fs-label); color:var(--subtle); }

/* ── RECHTE SPALTE: BENTO ─────────────────────────────────── */
.col-right {
  display:flex; flex-direction:column;
  padding:var(--pad-v) var(--pad-h);
  gap:clamp(10px, 1.8vh, 22px);
  justify-content:center;               /* Gruppen vertikal zentriert */
}

/* Gruppe: Label + 3 Kacheln */
.stat-group {
  flex-shrink:0;
  display:flex; flex-direction:column;
  gap:clamp(6px, 1vh, 12px);
}
.group-header {
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.group-label {
  font-size:var(--fs-label); font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; color:var(--subtle);
  white-space:nowrap;
}
.group-label.local { color:var(--accent); }
.group-line {
  flex:1; height:1px; background:var(--border);
}
.group-line.local {
  background:oklch(from var(--accent) l c h / .3);
}

/* 3 Kacheln in einer Reihe — feste Höhe */
.stats-row {
  display:flex;
  gap:clamp(6px, 0.8vw, 12px);
  height:clamp(120px, 15vh, 190px);     /* feste Höhe → keine leeren Riesen-Karten */
}

/* Einzelne KPI-Kachel */
.kpi-card {
  flex:1; min-width:0;
  display:flex; flex-direction:column;
  align-items:center;                   /* horizontal zentriert */
  justify-content:center;               /* vertikal zentriert */
  gap:clamp(4px, 0.6vh, 8px);
  padding:clamp(10px, 1.4vh, 18px) clamp(10px, 1.1vw, 16px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; position:relative; overflow:hidden;
  text-align:center;
}
.kpi-card::before {
  content:''; position:absolute;
  left:8%; right:8%; top:0; height:1px;
  background:linear-gradient(90deg, transparent,
    oklch(0.82 0.005 85), transparent);
}
.kpi-card.local {
  border-color:oklch(from var(--accent) l c h / .2);
  background:oklch(from var(--accent) 0.99 0.003 h);
}
.kpi-card.local::before {
  background:linear-gradient(90deg, transparent,
    oklch(from var(--accent) l c h / .35), transparent);
}

.kpi-stat {
  font-family:var(--mono); font-size:var(--fs-kpiSm); font-weight:900;
  letter-spacing:-.02em; line-height:1; color:var(--ink);
  font-variant-numeric:tabular-nums;
}
.kpi-card.local .kpi-stat { color:var(--accent); }

.kpi-label {
  font-size:var(--fs-label); font-weight:500;
  color:var(--muted); line-height:1.3;
}
.kpi-source {
  font-size:clamp(8px, 0.6vw, 10px); color:var(--subtle);
  letter-spacing:.04em;
}

/* Trennlinie zwischen Gruppen */
.group-sep {
  height:1px; background:var(--border); flex-shrink:0;
}

/* ── ANIMATIONEN ────────────────────────────────────────────── */
@keyframes up   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
@keyframes fade { from{opacity:0} to{opacity:1} }

.header       { animation:up   .55s cubic-bezier(.22,1,.36,1) .05s both }
.eyebrow      { animation:up   .55s cubic-bezier(.22,1,.36,1) .12s both }
.headline     { animation:up   .65s cubic-bezier(.22,1,.36,1) .20s both }
.subline      { animation:up   .55s cubic-bezier(.22,1,.36,1) .28s both }
.footer-left  { animation:fade .4s  ease                       .45s both }

.stat-group:nth-child(1) .group-header { animation:fade .4s ease .28s both }
.stat-group:nth-child(3) .group-header { animation:fade .4s ease .44s both }

.stat-group:nth-child(1) .kpi-card:nth-child(1) { animation:up .5s cubic-bezier(.22,1,.36,1) .32s both }
.stat-group:nth-child(1) .kpi-card:nth-child(2) { animation:up .5s cubic-bezier(.22,1,.36,1) .38s both }
.stat-group:nth-child(1) .kpi-card:nth-child(3) { animation:up .5s cubic-bezier(.22,1,.36,1) .44s both }
.stat-group:nth-child(3) .kpi-card:nth-child(1) { animation:up .5s cubic-bezier(.22,1,.36,1) .50s both }
.stat-group:nth-child(3) .kpi-card:nth-child(2) { animation:up .5s cubic-bezier(.22,1,.36,1) .56s both }
.stat-group:nth-child(3) .kpi-card:nth-child(3) { animation:up .5s cubic-bezier(.22,1,.36,1) .62s both }

@media (prefers-reduced-motion:reduce) {
  * { animation:none !important; opacity:1 !important; transform:none !important }
}
</style>
</head>
<body>
<div class="slide">

  <!-- LINKS -->
  <div class="col-left">
    <div class="header">
      <img class="dev-logo" id="devLogo" src="" alt="">
      <span class="slide-label">Markt</span>
    </div>
    <div class="content">
      <div class="eyebrow">Marktlage 2026</div>
      <h2 class="headline" id="headline">&#8212;</h2>
      <p  class="subline"  id="subline">&#8212;</p>
    </div>
    <div class="footer-left">
      <span class="address" id="address">&#8212;</span>
    </div>
  </div>

  <!-- RECHTS: BENTO -->
  <div class="col-right">

    <div class="stat-group">
      <div class="group-header">
        <span class="group-label">Deutschland</span>
        <div class="group-line"></div>
      </div>
      <div class="stats-row" id="rowNational"></div>
    </div>

    <div class="group-sep"></div>

    <div class="stat-group">
      <div class="group-header">
        <span class="group-label local" id="localLabel">Standort</span>
        <div class="group-line local"></div>
      </div>
      <div class="stats-row" id="rowLocal"></div>
    </div>

  </div>
</div>
<script>
function applyUITokens(ui) {
  if (!ui) return;
  const r = document.documentElement;
  if (ui.fontSans)   r.style.setProperty('--font',        ui.fontSans);
  if (ui.fontMono)   r.style.setProperty('--font-mono',   ui.fontMono);
  if (ui.logoHeader) r.style.setProperty('--logo-header', ui.logoHeader);
  if (ui.type) Object.entries(ui.type).forEach(([k, v]) =>
    r.style.setProperty('--fs-' + k, v)
  );
}

function makeCard(stat, label, source, isLocal) {
  const card = document.createElement('div');
  card.className = 'kpi-card' + (isLocal ? ' local' : '');
  card.innerHTML =
    '<div class="kpi-stat">' + stat + '</div>' +
    '<div class="kpi-label">' + label + '</div>' +
    (source ? '<div class="kpi-source">' + source + '</div>' : '');
  return card;
}

function applyProject(P) {
  const r = document.documentElement;
  if (P.accent)    r.style.setProperty('--accent',     P.accent);
  if (P.accentHex) r.style.setProperty('--accent-hex', P.accentHex);

  const $ = id => document.getElementById(id);
  $('devLogo').src = P.developerLogo || '';
  $('devLogo').alt = P.developer     || '';
  $('address').textContent = P.address || '';

  const m = P.market || {};
  $('headline').textContent = m.headline || '';
  $('subline').textContent  = m.intro    || '';
  $('localLabel').textContent = P.location || 'Standort';

  const rowN = $('rowNational');
  rowN.innerHTML = '';
  (m.national || []).forEach(d =>
    rowN.appendChild(makeCard(d.stat, d.label, d.source, false))
  );

  const rowL = $('rowLocal');
  rowL.innerHTML = '';
  (m.local || []).forEach(d =>
    rowL.appendChild(makeCard(d.stat, d.label, d.source, true))
  );
}

try { if (window.parent?.PROJECT) {
  applyProject(window.parent.PROJECT);
  applyUITokens(window.parent.PROJECT?.ui);
}} catch(e) {}

window.addEventListener('message', e => {
  if (e.data?.type === 'PROJECT_DATA') {
    applyProject(e.data.data);
    applyUITokens(e.data.ui);
  }
});
</script>
</body>
</html>
