<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markt 2026</title>
<style>
:root {
  --bg:      oklch(0.98 0.005 85);
  --surface: oklch(0.995 0.003 85);
  --ink:     oklch(0.18 0.02 250);
  --muted:   oklch(0.50 0.02 250);
  --subtle:  oklch(0.70 0.01 250);
  --border:  oklch(0.88 0.01 85);
  --accent:  oklch(0.55 0.13 160);
  --font:    "Roboto", system-ui, -apple-system, sans-serif;
  --mono:    ui-monospace, "SFMono-Regular", Menlo, monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh; overflow:hidden;
  background:var(--bg); font-family:var(--font);
  -webkit-font-smoothing:antialiased; color:var(--ink);
}

/* ── LAYOUT ─────────────────────────────────────────────────── */
.slide {
  display:grid;
  grid-template-columns: 36fr 64fr;
  width:100vw; height:100vh;
}

/* ── LINKS ──────────────────────────────────────────────────── */
.col-left {
  display:flex; flex-direction:column;
  padding:clamp(24px,3.5vh,48px) clamp(24px,3vw,48px);
  position:relative; overflow:hidden;
  border-right:1px solid var(--border);
}
.col-left::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(oklch(0.84 0.005 85) 1.2px, transparent 1.2px);
  background-size:28px 28px;
  mask-image:linear-gradient(160deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 55%);
  -webkit-mask-image:linear-gradient(160deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 55%);
}
.col-left::after {
  content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:3px; border-radius:0 3px 3px 0;
  background:var(--accent); opacity:.5;
}

.header {
  position:relative; z-index:1; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:clamp(24px,4vh,48px);
}
.dev-logo { height:clamp(22px,2.6vh,38px); width:auto; object-fit:contain; }
.slide-num {
  font-size:clamp(9px,.72vw,11px); font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; color:var(--subtle);
}

.content {
  position:relative; z-index:1;
  flex:1; display:flex; flex-direction:column;
  justify-content:center; gap:clamp(10px,1.6vh,20px);
}
.eyebrow {
  display:flex; align-items:center; gap:8px;
  font-size:clamp(9px,.75vw,12px); font-weight:700;
  letter-spacing:.22em; text-transform:uppercase; color:var(--accent);
}
.eyebrow::before {
  content:''; width:clamp(14px,1.6vw,22px); height:2px;
  background:var(--accent); border-radius:2px; flex-shrink:0;
}
.headline {
  font-size:clamp(1.5rem,2.8vw,3.2rem); font-weight:900;
  letter-spacing:-.025em; line-height:1.05; color:var(--ink);
}
.intro-text {
  font-size:clamp(.85rem,1.1vw,1.15rem); font-weight:300;
  color:var(--muted); line-height:1.6;
}

.footer-left {
  position:relative; z-index:1; flex-shrink:0;
  padding-top:clamp(10px,1.5vh,18px);
  border-top:1px solid var(--border);
  margin-top:clamp(12px,2vh,24px);
}
.address { font-size:clamp(10px,.8vw,13px); color:var(--subtle); }

/* ── RECHTS — BENTO ─────────────────────────────────────────── */
.col-right {
  display:flex; flex-direction:column;
  padding:clamp(24px,3.5vh,48px) clamp(24px,3vw,52px);
  gap:clamp(16px,2.8vh,32px);
}

/* Stat-Gruppe: Label + 3 Kacheln */
.stat-group { display:flex; flex-direction:column; gap:clamp(8px,1.2vh,14px); flex:1; }

.group-header {
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.group-label {
  font-size:clamp(9px,.72vw,11px); font-weight:700;
  letter-spacing:.2em; text-transform:uppercase; color:var(--subtle);
}
.group-label.local { color:var(--accent); }
.group-divider {
  flex:1; height:1px; background:var(--border);
}
.group-divider.local { background:oklch(from var(--accent) l c h / .3); }

/* 3 Kacheln in einer Reihe */
.stats-row {
  display:flex; gap:clamp(8px,1vw,14px); flex:1;
}

/* Einzelne KPI-Kachel */
.kpi-card {
  flex:1; min-width:0;
  display:flex; flex-direction:column; gap:clamp(4px,.6vh,8px);
  padding:clamp(12px,1.6vh,20px) clamp(12px,1.2vw,18px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px;
  position:relative; overflow:hidden;
  transition:box-shadow .2s, border-color .2s;
}
.kpi-card::before {
  content:''; position:absolute;
  top:0; left:8%; right:8%; height:1px;
  background:linear-gradient(90deg,transparent,oklch(0.82 0.005 85),transparent);
}
.kpi-card.local {
  border-color:oklch(from var(--accent) l c h / .2);
  background:oklch(from var(--accent) 0.99 0.003 h);
}
.kpi-card.local::before {
  background:linear-gradient(90deg,transparent,oklch(from var(--accent) l c h / .3),transparent);
}

.kpi-stat {
  font-family:var(--mono); font-size:clamp(1.4rem,2.4vw,2.8rem);
  font-weight:900; letter-spacing:-.02em; line-height:1;
  color:var(--ink); font-variant-numeric:tabular-nums;
}
.kpi-card.local .kpi-stat { color:var(--accent); }

.kpi-label {
  font-size:clamp(9px,.75vw,12px); font-weight:500;
  color:var(--muted); line-height:1.3;
}

.kpi-source {
  font-size:clamp(8px,.62vw,10px); font-weight:400;
  color:var(--subtle); margin-top:auto;
  letter-spacing:.04em;
}

/* Trennlinie zwischen den Gruppen */
.group-separator {
  height:1px; background:var(--border); flex-shrink:0;
  margin:clamp(-4px,-0.5vh,-2px) 0;
}

/* ── ANIMATIONEN ────────────────────────────────────────────── */
@keyframes up   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes fade { from{opacity:0} to{opacity:1} }

.header      { animation:up   .55s cubic-bezier(.22,1,.36,1) .05s both }
.eyebrow     { animation:up   .55s cubic-bezier(.22,1,.36,1) .1s  both }
.headline    { animation:up   .65s cubic-bezier(.22,1,.36,1) .18s both }
.intro-text  { animation:up   .55s cubic-bezier(.22,1,.36,1) .28s both }
.footer-left { animation:fade .4s  ease                       .35s both }

/* Kacheln gestaffelt */
.kpi-card:nth-child(1) { animation:up .55s cubic-bezier(.22,1,.36,1) .3s  both }
.kpi-card:nth-child(2) { animation:up .55s cubic-bezier(.22,1,.36,1) .38s both }
.kpi-card:nth-child(3) { animation:up .55s cubic-bezier(.22,1,.36,1) .46s both }

.stat-group:nth-child(3) .kpi-card:nth-child(1) { animation-delay:.5s  }
.stat-group:nth-child(3) .kpi-card:nth-child(2) { animation-delay:.58s }
.stat-group:nth-child(3) .kpi-card:nth-child(3) { animation-delay:.66s }

.group-header { animation:fade .4s ease .28s both }
.stat-group:nth-child(3) .group-header { animation-delay:.44s }

@media (prefers-reduced-motion:reduce) {
  * { animation:none!important; opacity:1!important; transform:none!important }
}
</style>
</head>
<body>
<div class="slide">

  <!-- LINKS -->
  <div class="col-left">
    <div class="header">
      <img class="dev-logo" id="devLogo" src="" alt="">
      <span class="slide-num">Markt</span>
    </div>
    <div class="content">
      <div class="eyebrow">Marktlage 2026</div>
      <h2 class="headline" id="headline">—</h2>
      <p  class="intro-text" id="introText">—</p>
    </div>
    <div class="footer-left">
      <span class="address" id="address">—</span>
    </div>
  </div>

  <!-- RECHTS -->
  <div class="col-right">

    <!-- Gruppe 1: National -->
    <div class="stat-group" id="groupNational">
      <div class="group-header">
        <span class="group-label">Deutschland</span>
        <div class="group-divider"></div>
      </div>
      <div class="stats-row" id="rowNational"></div>
    </div>

    <div class="group-separator"></div>

    <!-- Gruppe 2: Lokal -->
    <div class="stat-group" id="groupLocal">
      <div class="group-header">
        <span class="group-label local" id="localLabel">Standort</span>
        <div class="group-divider local"></div>
      </div>
      <div class="stats-row" id="rowLocal"></div>
    </div>

  </div>
</div>

<script>
function makeCard(stat, label, source, isLocal) {
  const card = document.createElement('div');
  card.className = 'kpi-card' + (isLocal ? ' local' : '');
  card.innerHTML =
    `<div class="kpi-stat">${stat}</div>` +
    `<div class="kpi-label">${label}</div>` +
    (source ? `<div class="kpi-source">${source}</div>` : '');
  return card;
}

function applyProject(P) {
  const r = document.documentElement;
  if (P.accent)    r.style.setProperty('--accent',     P.accent);
  if (P.accentHex) r.style.setProperty('--accent-hex', P.accentHex);

  const $ = id => document.getElementById(id);
  $('devLogo').src    = P.developerLogo || '';
  $('devLogo').alt    = P.developer     || '';
  $('address').textContent  = P.address  || '';

  const m = P.market || {};
  $('headline').textContent  = m.headline  || '';
  $('introText').textContent = m.intro     || '';
  $('localLabel').textContent = P.location || 'Standort';

  // Nationale Daten
  const rowN = $('rowNational');
  rowN.innerHTML = '';
  (m.national || []).forEach(d => {
    rowN.appendChild(makeCard(d.stat, d.label, d.source, false));
  });

  // Lokale Daten
  const rowL = $('rowLocal');
  rowL.innerHTML = '';
  (m.local || []).forEach(d => {
    rowL.appendChild(makeCard(d.stat, d.label, d.source, true));
  });
}

try { if (window.parent?.PROJECT) applyProject(window.parent.PROJECT); } catch(e){}
window.addEventListener('message', e => {
  if (e.data?.type === 'PROJECT_DATA') applyProject(e.data.data);
});
</script>
</body>
</html>
