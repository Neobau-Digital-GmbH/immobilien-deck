<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover</title>
<style>
/* ── DESIGN SYSTEM ─────────────────────────────────────────────── */
:root {
  --bg:        oklch(0.98 0.005 85);
  --surface:   oklch(0.995 0.003 85);
  --ink:       oklch(0.18 0.02 250);
  --muted:     oklch(0.50 0.02 250);
  --subtle:    oklch(0.70 0.01 250);
  --border:    oklch(0.88 0.01 85);
  --accent:    oklch(0.55 0.13 160);
  --font:      "Roboto", system-ui, -apple-system, sans-serif;
  --font-mono: ui-monospace, "SFMono-Regular", Menlo, monospace;
  --radius:    20px;
  --img-bg:    oklch(0.82 0.04 65);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh; overflow:hidden;
  background:var(--bg); font-family:var(--font);
  -webkit-font-smoothing:antialiased; color:var(--ink);
}

/* ── LAYOUT ─────────────────────────────────────────────────────── */
.slide {
  display:grid;
  grid-template-columns: 52fr 48fr;
  grid-template-rows: 1fr auto;
  width:100vw; height:100vh;
}

/* ── LEFT COLUMN ────────────────────────────────────────────────── */
.col-left {
  grid-row: 1 / 3;
  display:flex; flex-direction:column;
  padding: clamp(28px,4vh,52px) clamp(32px,4vw,64px) clamp(20px,3vh,36px);
  position:relative; overflow:hidden;
  background:var(--bg);
}

/* Dezentes Dot-Pattern links */
.col-left::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(oklch(0.84 0.005 85) 1.2px, transparent 1.2px);
  background-size:28px 28px;
  mask-image:linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 60%);
  -webkit-mask-image:linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 60%);
}

/* Thin accent line ganz links */
.col-left::after {
  content:''; position:absolute; left:0; top:15%; bottom:15%;
  width:3px; border-radius:0 3px 3px 0;
  background:var(--accent); opacity:0.6;
}

/* ── HEADER ─────────────────────────────────────────────────────── */
.header {
  position:relative; z-index:1;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; margin-bottom:auto;
}
.dev-logo {
  height:clamp(24px,2.8vh,42px); width:auto; object-fit:contain;
}
.deck-label {
  font-size:clamp(9px,0.72vw,11px); font-weight:700;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--subtle);
}

/* ── CONTENT ────────────────────────────────────────────────────── */
.content {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  flex:1; justify-content:center;
  gap:clamp(10px,1.5vh,18px);
}

.eyebrow {
  display:flex; align-items:center; gap:8px;
  font-size:clamp(9px,0.75vw,12px); font-weight:700;
  letter-spacing:0.22em; text-transform:uppercase; color:var(--accent);
}
.eyebrow::before {
  content:''; width:clamp(16px,1.8vw,28px); height:2px;
  background:var(--accent); border-radius:2px; flex-shrink:0;
}

.project-name {
  font-size:clamp(3rem,7.5vw,8.5rem); font-weight:900;
  letter-spacing:-0.035em; line-height:0.92;
  color:var(--ink); word-break:break-word;
}

.tagline {
  font-size:clamp(1rem,1.4vw,1.5rem); font-weight:300;
  color:var(--muted); letter-spacing:0.01em; line-height:1.4;
}

.divider {
  width:clamp(32px,5vw,64px); height:3px; border-radius:3px;
  background:var(--accent); flex-shrink:0;
  margin:clamp(4px,0.8vh,10px) 0;
}

/* Fact-Chips */
.facts {
  display:flex; flex-wrap:wrap; gap:8px;
  align-items:center;
}
.fact {
  display:flex; flex-direction:column; gap:1px;
  padding:clamp(6px,0.9vh,10px) clamp(10px,1.1vw,16px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px;
}
.fact-v {
  font-size:clamp(12px,1.1vw,15px); font-weight:700; color:var(--ink);
  font-variant-numeric:tabular-nums;
}
.fact-l {
  font-size:clamp(9px,0.68vw,11px); font-weight:500;
  letter-spacing:0.09em; text-transform:uppercase; color:var(--subtle);
}

/* ── LEFT FOOTER ────────────────────────────────────────────────── */
.footer-left {
  position:relative; z-index:1; flex-shrink:0;
  margin-top:clamp(14px,2.5vh,28px);
  padding-top:clamp(12px,1.8vh,20px);
  border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.address {
  font-size:clamp(10px,0.8vw,13px); color:var(--subtle); font-weight:400;
}
.brand {
  font-size:clamp(10px,0.75vw,12px); font-weight:700;
  letter-spacing:0.06em; color:var(--subtle);
}
.brand span { color:var(--accent); }

/* ── RIGHT COLUMN ───────────────────────────────────────────────── */
.col-right {
  grid-row: 1 / 3;
  position:relative; overflow:hidden;
  background:var(--img-bg);
  border-radius:var(--radius) 0 0 var(--radius);
}

.cover-img {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; object-position:center;
  display:block;
}

/* Subtiler Gradient über dem Bild — unten und links für Lesbarkeit */
.img-overlay {
  position:absolute; inset:0; pointer-events:none;
  background:
    linear-gradient(to right, oklch(0.15 0.02 250 / 0.18) 0%, transparent 40%),
    linear-gradient(to top, oklch(0.15 0.02 250 / 0.30) 0%, transparent 35%);
}

/* Image-Pattern als Placeholder wenn kein Bild */
.img-placeholder {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 80% at 65% 35%, oklch(0.78 0.06 70) 0%, oklch(0.70 0.08 55) 50%, oklch(0.60 0.06 45) 100%);
}

/* Verfügbarkeits-Pill oben rechts im Bild */
.avail-pill {
  position:absolute; top:clamp(16px,2.5vh,28px); right:clamp(16px,2vw,28px);
  display:flex; align-items:center; gap:7px;
  padding:clamp(6px,0.9vh,9px) clamp(10px,1.2vw,16px);
  background:oklch(0.995 0 0 / 0.88);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid oklch(1 0 0 / 0.5);
  border-radius:50px;
  box-shadow:0 2px 16px oklch(0.2 0 0 / 0.10);
}
.avail-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--accent); flex-shrink:0;
  box-shadow:0 0 0 3px oklch(from var(--accent) l c h / 0.18);
}
.avail-text {
  font-size:clamp(10px,0.82vw,13px); font-weight:600; color:var(--ink);
  white-space:nowrap;
}

/* Energie-Badge unten rechts im Bild */
.energy-badge {
  position:absolute; bottom:clamp(16px,2.5vh,28px); right:clamp(16px,2vw,28px);
  display:flex; align-items:center; gap:8px;
  padding:clamp(7px,1vh,11px) clamp(12px,1.4vw,18px);
  background:oklch(0.18 0.02 250 / 0.80);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid oklch(1 0 0 / 0.12);
  border-radius:12px;
}
.energy-label {
  font-size:clamp(9px,0.7vw,11px); font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase;
  color:oklch(1 0 0 / 0.55);
}
.energy-val {
  font-size:clamp(11px,0.9vw,14px); font-weight:700; color:#fff;
}

/* ── ANIMATIONEN ────────────────────────────────────────────────── */
@keyframes slideUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; } to { opacity:1; }
}

.eyebrow    { animation:slideUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.05s both; }
.project-name { animation:slideUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.15s both; }
.tagline    { animation:slideUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.28s both; }
.divider    { animation:fadeIn  0.5s ease 0.38s both; }
.facts      { animation:slideUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.45s both; }
.footer-left{ animation:fadeIn  0.5s ease 0.55s both; }
.col-right  { animation:fadeIn  0.8s ease 0.0s  both; }
.avail-pill { animation:slideUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.6s both; }
.energy-badge{animation:fadeIn  0.5s ease 0.65s both; }

@media (prefers-reduced-motion:reduce) {
  * { animation:none !important; opacity:1 !important; transform:none !important; }
}
</style>
</head>
<body>
<div class="slide">

  <!-- ── LINKS ── -->
  <div class="col-left">

    <div class="header">
      <img class="dev-logo" id="devLogo" src="" alt="">
      <span class="deck-label">Immobilienprojekt</span>
    </div>

    <div class="content">
      <div class="eyebrow" id="eyebrow">Neubau</div>
      <h1 class="project-name" id="projectName">—</h1>
      <p  class="tagline"       id="tagline">—</p>
      <div class="divider"></div>
      <div class="facts" id="facts"></div>
    </div>

    <div class="footer-left">
      <span class="address" id="address">—</span>
      <span class="brand">neubau<span>.</span>marketing</span>
    </div>

  </div>

  <!-- ── RECHTS ── -->
  <div class="col-right">
    <div class="img-placeholder"></div>
    <img class="cover-img" id="coverImg" src="" alt="" loading="eager">
    <div class="img-overlay"></div>

    <div class="avail-pill">
      <div class="avail-dot"></div>
      <span class="avail-text" id="availText">— verfügbar</span>
    </div>

    <div class="energy-badge">
      <span class="energy-label">Standard</span>
      <span class="energy-val" id="energyVal">—</span>
    </div>
  </div>

</div>

<script>
// ── PROJECT DATEN ANWENDEN ───────────────────────────────────────
function applyProject(P) {
  const r = document.documentElement;
  if (P.accent)    r.style.setProperty('--accent',   P.accent);
  if (P.accentHex) r.style.setProperty('--accent-hex', P.accentHex);

  // Texte
  const el = (id) => document.getElementById(id);
  el('devLogo').src  = P.developerLogo || '';
  el('devLogo').alt  = P.developer     || '';
  el('eyebrow').textContent   = 'Neubau \u00b7 ' + (P.location || '');
  el('projectName').textContent = P.name      || '';
  el('tagline').textContent     = P.tagline   || '';
  el('address').textContent     = P.address   || '';
  el('energyVal').textContent   = P.energyStandard || '';
  el('availText').textContent   =
    (P.availableUnits || '\u2014') + ' von ' + (P.units || '\u2014') +
    ' Einheiten verf\u00fcgbar';

  // Cover-Bild
  if (P.images && P.images.cover) {
    const img = el('coverImg');
    img.src = P.images.cover;
    img.alt = P.name;
  }

  // Facts
  const factsEl = el('facts');
  factsEl.innerHTML = '';
  const facts = [
    { v: (P.units || '\u2014') + '\u00a0WE',        l: 'Einheiten' },
    { v: P.rooms || '\u2014',                        l: 'Zimmer' },
    { v: 'ab\u00a0' + formatPrice(P.priceFrom),     l: 'Kaufpreis' },
    { v: P.completionDate || '\u2014',               l: 'Erstbezug' },
  ];
  facts.forEach(f => {
    const chip = document.createElement('div');
    chip.className = 'fact';
    chip.innerHTML = `<span class="fact-v">${f.v}</span><span class="fact-l">${f.l}</span>`;
    factsEl.appendChild(chip);
  });
}

function formatPrice(n) {
  if (!n) return '\u2014';
  if (n >= 1000000) return (n/1000000).toLocaleString('de',{maximumFractionDigits:1})+'\u00a0Mio.\u00a0\u20ac';
  if (n >= 1000)    return Math.round(n/1000).toLocaleString('de')+'\u00a0T\u20ac';
  return n.toLocaleString('de')+'\u00a0\u20ac';
}

// 1. Versuche parent (same-origin / lokal)
try {
  if (window.parent && window.parent.PROJECT) {
    applyProject(window.parent.PROJECT);
  }
} catch(e) {}

// 2. postMessage (cross-origin / production)
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'PROJECT_DATA') {
    applyProject(e.data.data);
  }
});
</script>
</body>
</html>
