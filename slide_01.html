<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover</title>
<style>
:root {
  --bg:      oklch(0.98 0.005 85);
  --surface: oklch(0.995 0.003 85);
  --ink:     oklch(0.18 0.02 250);
  --muted:   oklch(0.50 0.02 250);
  --subtle:  oklch(0.70 0.01 250);
  --border:  oklch(0.88 0.01 85);
  --accent:  oklch(0.55 0.13 160);
  --font:    "Roboto", system-ui, -apple-system, sans-serif;
  --img-bg:  oklch(0.82 0.04 65);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh; overflow:hidden;
  background:var(--bg); font-family:var(--font);
  -webkit-font-smoothing:antialiased; color:var(--ink);
}

/* ── GRID ─────────────────────────────────────────────────── */
.slide {
  display:grid;
  grid-template-columns:52fr 48fr;
  width:100vw; height:100vh;
}

/* ── LINKS ────────────────────────────────────────────────── */
.col-left {
  display:flex; flex-direction:column;
  padding:clamp(24px,3.5vh,48px) clamp(28px,3.5vw,60px);
  position:relative; overflow:hidden;
  background:var(--bg);
}
/* Dot-Pattern */
.col-left::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(oklch(0.84 0.005 85) 1.2px, transparent 1.2px);
  background-size:28px 28px;
  mask-image:linear-gradient(135deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,0) 58%);
  -webkit-mask-image:linear-gradient(135deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,0) 58%);
}
/* Accent-Line */
.col-left::after {
  content:''; position:absolute; left:0; top:18%; bottom:18%;
  width:3px; border-radius:0 3px 3px 0;
  background:var(--accent); opacity:.55;
}

/* Header */
.header {
  position:relative; z-index:1;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; margin-bottom:clamp(20px,3.5vh,44px);
}
.dev-logo { height:clamp(22px,2.6vh,40px); width:auto; object-fit:contain; }
.deck-label {
  font-size:clamp(9px,.72vw,11px); font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; color:var(--subtle);
}

/* Content */
.content {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  flex:1; justify-content:center;
  gap:clamp(8px,1.2vh,14px);
  min-height:0;
}
.eyebrow {
  display:flex; align-items:center; gap:8px;
  font-size:clamp(9px,.75vw,12px); font-weight:700;
  letter-spacing:.22em; text-transform:uppercase; color:var(--accent);
}
.eyebrow::before {
  content:''; width:clamp(14px,1.6vw,24px); height:2px;
  background:var(--accent); border-radius:2px; flex-shrink:0;
}
.project-name {
  font-size:clamp(2.8rem,7vw,8rem); font-weight:900;
  letter-spacing:-.035em; line-height:.92; color:var(--ink);
  word-break:break-word;
}
.tagline {
  font-size:clamp(.95rem,1.35vw,1.45rem); font-weight:300;
  color:var(--muted); letter-spacing:.01em; line-height:1.4;
}
.divider {
  width:clamp(28px,4.5vw,56px); height:3px; border-radius:3px;
  background:var(--accent); flex-shrink:0;
  margin:clamp(2px,.5vh,6px) 0;
}

/* Fact-Chips */
.facts {
  display:flex; flex-wrap:wrap; gap:7px;
}
.fact {
  display:flex; flex-direction:column; gap:1px;
  padding:clamp(5px,.8vh,9px) clamp(9px,1vw,14px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px;
}
.fact-v {
  font-size:clamp(11px,1vw,14px); font-weight:700; color:var(--ink);
  font-variant-numeric:tabular-nums;
}
.fact-l {
  font-size:clamp(8px,.62vw,10px); font-weight:500;
  letter-spacing:.09em; text-transform:uppercase; color:var(--subtle);
}

/* Highlights: Energy + USPs */
.highlights {
  display:flex; flex-direction:column; gap:clamp(7px,1vh,11px);
  padding:clamp(10px,1.4vh,16px) clamp(12px,1.3vw,18px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px;
  flex-shrink:0;
  position:relative; overflow:hidden;
}
.highlights::before {
  content:''; position:absolute; top:0; left:0; bottom:0;
  width:3px; background:var(--accent); border-radius:3px 0 0 3px;
  opacity:.7;
}
.energy-row {
  display:flex; align-items:center; gap:8px;
}
.energy-lbl {
  font-size:clamp(8px,.65vw,10px); font-weight:700;
  letter-spacing:.12em; text-transform:uppercase; color:var(--subtle);
}
.energy-tag {
  font-size:clamp(10px,.82vw,12px); font-weight:700; color:var(--accent);
  padding:2px 8px; border-radius:6px;
  background:oklch(from var(--accent) l c h / .09);
  border:1px solid oklch(from var(--accent) l c h / .22);
}
.usps {
  list-style:none; display:flex; flex-direction:column;
  gap:clamp(4px,.6vh,7px);
}
.usps li {
  font-size:clamp(10px,.82vw,12.5px); color:var(--muted);
  display:flex; align-items:flex-start; gap:6px; line-height:1.35;
}
.usps li::before {
  content:'✓'; color:var(--accent); font-weight:700;
  flex-shrink:0; font-size:.9em; margin-top:1px;
}

/* Footer */
.footer-left {
  position:relative; z-index:1; flex-shrink:0;
  margin-top:clamp(12px,2vh,24px);
  padding-top:clamp(10px,1.5vh,18px);
  border-top:1px solid var(--border);
}
.address {
  font-size:clamp(10px,.8vw,13px); color:var(--subtle); font-weight:400;
}

/* ── RECHTS ────────────────────────────────────────────────── */
.col-right {
  position:relative; overflow:hidden;
  background:var(--img-bg);
  border-radius:var(--radius,20px) 0 0 var(--radius,20px);
}
.cover-img {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; object-position:center; display:block;
}
.img-overlay {
  position:absolute; inset:0; pointer-events:none;
  background:
    linear-gradient(to right, oklch(0.15 0.02 250 / .15) 0%, transparent 38%),
    linear-gradient(to top,   oklch(0.15 0.02 250 / .25) 0%, transparent 30%);
}
.img-placeholder {
  position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 80% at 65% 35%,
    oklch(0.78 0.06 70) 0%, oklch(0.70 0.08 55) 50%, oklch(0.60 0.06 45) 100%);
}

/* Verfügbarkeits-Pill */
.avail-pill {
  position:absolute; top:clamp(14px,2.2vh,26px); right:clamp(14px,1.8vw,26px);
  display:flex; align-items:center; gap:7px;
  padding:clamp(5px,.8vh,8px) clamp(9px,1.1vw,14px);
  background:oklch(0.995 0 0 / .88);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid oklch(1 0 0 / .5);
  border-radius:50px;
  box-shadow:0 2px 16px oklch(0.2 0 0 / .10);
}
.avail-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--accent); flex-shrink:0;
  box-shadow:0 0 0 3px oklch(from var(--accent) l c h / .18);
}
.avail-text {
  font-size:clamp(9px,.8vw,12px); font-weight:600; color:var(--ink);
  white-space:nowrap;
}

/* ── ANIMATIONEN ────────────────────────────────────────────── */
@keyframes up   { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
@keyframes fade { from{opacity:0}to{opacity:1} }

.header        { animation:up   .6s cubic-bezier(.22,1,.36,1) .05s  both }
.eyebrow       { animation:up   .6s cubic-bezier(.22,1,.36,1) .12s  both }
.project-name  { animation:up   .7s cubic-bezier(.22,1,.36,1) .2s   both }
.tagline       { animation:up   .6s cubic-bezier(.22,1,.36,1) .32s  both }
.divider       { animation:fade .5s ease                       .4s   both }
.facts         { animation:up   .6s cubic-bezier(.22,1,.36,1) .46s  both }
.highlights    { animation:up   .6s cubic-bezier(.22,1,.36,1) .54s  both }
.footer-left   { animation:fade .5s ease                       .62s  both }
.col-right     { animation:fade .8s ease                       0s    both }
.avail-pill    { animation:up   .6s cubic-bezier(.22,1,.36,1) .65s  both }

@media (prefers-reduced-motion:reduce) {
  *{animation:none!important;opacity:1!important;transform:none!important}
}
</style>
</head>
<body>
<div class="slide">

  <!-- LINKS -->
  <div class="col-left">
    <div class="header">
      <img class="dev-logo" id="devLogo" src="" alt="">
      <span class="deck-label">Immobilienprojekt</span>
    </div>

    <div class="content">
      <div class="eyebrow" id="eyebrow">Neubau</div>
      <h1 class="project-name" id="projectName">—</h1>
      <p  class="tagline"      id="tagline">—</p>
      <div class="divider"></div>
      <div class="facts" id="facts"></div>

      <div class="highlights" id="highlights">
        <div class="energy-row">
          <span class="energy-lbl">Standard</span>
          <span class="energy-tag" id="energyTag">—</span>
        </div>
        <ul class="usps" id="usps"></ul>
      </div>
    </div>

    <div class="footer-left">
      <span class="address" id="address">—</span>
    </div>
  </div>

  <!-- RECHTS -->
  <div class="col-right">
    <div class="img-placeholder"></div>
    <img class="cover-img" id="coverImg" src="" alt="" loading="eager">
    <div class="img-overlay"></div>
    <div class="avail-pill">
      <div class="avail-dot"></div>
      <span class="avail-text" id="availText">— verfügbar</span>
    </div>
  </div>

</div>
<script>
function fmt(n) {
  if (!n) return '\u2014';
  return n>=1000000
    ? (n/1000000).toLocaleString('de',{maximumFractionDigits:1})+'\u00a0Mio.\u00a0\u20ac'
    : Math.round(n/1000).toLocaleString('de')+'\u00a0T\u20ac';
}

function applyProject(P) {
  const r = document.documentElement;
  if (P.accent)    r.style.setProperty('--accent',     P.accent);
  if (P.accentHex) r.style.setProperty('--accent-hex', P.accentHex);

  const $  = id => document.getElementById(id);
  $('devLogo').src        = P.developerLogo || '';
  $('devLogo').alt        = P.developer     || '';
  $('eyebrow').textContent   = 'Neubau \u00b7 ' + (P.location || '');
  $('projectName').textContent = P.name      || '';
  $('tagline').textContent     = P.tagline   || '';
  $('address').textContent     = P.address   || '';
  $('energyTag').textContent   = P.energyStandard || '';
  $('availText').textContent   =
    (P.availableUnits||'\u2014')+' von '+(P.units||'\u2014')+' Einheiten verf\u00fcgbar';

  if (P.images?.cover) {
    $('coverImg').src = P.images.cover;
    $('coverImg').alt = P.name;
  }

  // Fact-Chips
  const factsEl = $('facts');
  factsEl.innerHTML = '';
  [
    { v:(P.units||'\u2014')+'\u00a0WE', l:'Einheiten' },
    { v:P.rooms||'\u2014',              l:'Zimmer' },
    { v:'ab\u00a0'+fmt(P.priceFrom),    l:'Kaufpreis' },
    { v:P.completionDate||'\u2014',     l:'Erstbezug' },
  ].forEach(f=>{
    const c=document.createElement('div');
    c.className='fact';
    c.innerHTML=`<span class="fact-v">${f.v}</span><span class="fact-l">${f.l}</span>`;
    factsEl.appendChild(c);
  });

  // USPs — KA oder EN je nach Zielgruppe
  const uspsEl = $('usps');
  uspsEl.innerHTML = '';
  const uspList = (P.audience==='EN' ? P.en?.usps : P.ka?.usps) || [];
  uspList.forEach(u=>{
    const li=document.createElement('li');
    li.textContent=u;
    uspsEl.appendChild(li);
  });

  // Highlights ausblenden wenn keine USPs
  if (!uspList.length && !P.energyStandard) {
    $('highlights').style.display='none';
  }
}

// 1. Same-origin (lokales Testen)
try { if (window.parent?.PROJECT) applyProject(window.parent.PROJECT); } catch(e){}
// 2. postMessage (production cross-origin)
window.addEventListener('message', e=>{
  if (e.data?.type==='PROJECT_DATA') applyProject(e.data.data);
});
</script>
</body>
</html>
