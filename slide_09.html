<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bauträger &amp; Vertrauen</title>
<style>
:root {
  --bg:      oklch(0.98 0.005 85);
  --surface: oklch(0.995 0.003 85);
  --ink:     oklch(0.18 0.02 250);
  --muted:   oklch(0.50 0.02 250);
  --subtle:  oklch(0.70 0.01 250);
  --border:  oklch(0.88 0.01 85);
  --accent:  oklch(0.55 0.13 160);
  --font:    "Roboto", system-ui, -apple-system, sans-serif;
  --mono:    ui-monospace, "SFMono-Regular", Menlo, monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh; overflow:hidden;
  background:var(--bg); font-family:var(--font);
  -webkit-font-smoothing:antialiased; color:var(--ink);
}
.slide {
  display:grid; grid-template-columns:40fr 60fr;
  width:100vw; height:100vh;
}

/* ── LINKS ─────────────────────────────────────────────────── */
.col-left {
  display:flex; flex-direction:column;
  padding:clamp(24px,3.5vh,48px) clamp(24px,3vw,48px);
  position:relative; overflow:hidden;
  border-right:1px solid var(--border);
}
.col-left::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(oklch(0.84 0.005 85) 1.2px,transparent 1.2px);
  background-size:28px 28px;
  mask-image:linear-gradient(160deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,0) 55%);
  -webkit-mask-image:linear-gradient(160deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,0) 55%);
}
.col-left::after {
  content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:3px; border-radius:0 3px 3px 0;
  background:var(--accent); opacity:.5;
}

/* Header */
.header {
  position:relative; z-index:1; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:clamp(14px,2.5vh,32px);
}
.dev-logo-small { height:clamp(20px,2.4vh,34px); width:auto; object-fit:contain; }
.slide-num { font-size:clamp(9px,.72vw,11px); font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--subtle); }

/* Developer Logo Block */
.dev-hero { position:relative; z-index:1; flex-shrink:0; margin-bottom:clamp(12px,2vh,24px); }
.dev-logo-large {
  height:clamp(36px,4.5vh,62px); width:auto; object-fit:contain; display:block;
}
.dev-name {
  font-size:clamp(1rem,1.5vw,1.7rem); font-weight:900;
  letter-spacing:-.02em; color:var(--ink); margin-top:clamp(6px,1vh,12px);
  line-height:1.1;
}
.dev-tagline {
  font-size:clamp(.82rem,.95vw,1.05rem); font-weight:300;
  color:var(--muted); margin-top:4px; line-height:1.4;
}

/* Content */
.content {
  position:relative; z-index:1; flex:1; display:flex;
  flex-direction:column; justify-content:center; gap:clamp(10px,1.6vh,20px);
}
.eyebrow {
  display:flex; align-items:center; gap:8px;
  font-size:clamp(9px,.75vw,12px); font-weight:700;
  letter-spacing:.22em; text-transform:uppercase; color:var(--accent);
}
.eyebrow::before {
  content:''; width:clamp(14px,1.6vw,22px); height:2px;
  background:var(--accent); border-radius:2px; flex-shrink:0;
}
.headline {
  font-size:clamp(1.3rem,2.2vw,2.6rem); font-weight:900;
  letter-spacing:-.025em; line-height:1.05; color:var(--ink);
}
.description {
  font-size:clamp(.82rem,1vw,1.08rem); font-weight:300;
  color:var(--muted); line-height:1.65;
}

/* KPI Stats — 2×2 Bento */
.stats-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:clamp(7px,.9vh,11px);
}
.stat-card {
  display:flex; flex-direction:column; gap:2px;
  padding:clamp(9px,1.2vh,15px) clamp(10px,1.1vw,16px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; position:relative; overflow:hidden;
}
.stat-card.accent-card {
  background:oklch(from var(--accent) 0.98 0.01 h);
  border-color:oklch(from var(--accent) l c h / .25);
}
.stat-card::before {
  content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
  background:linear-gradient(90deg,transparent,oklch(0.82 0.005 85),transparent);
}
.stat-card.accent-card::before {
  background:linear-gradient(90deg,transparent,oklch(from var(--accent) l c h / .4),transparent);
}
.stat-val {
  font-family:var(--mono); font-size:clamp(1.2rem,2vw,2.4rem); font-weight:900;
  letter-spacing:-.02em; color:var(--ink); line-height:1;
  font-variant-numeric:tabular-nums;
}
.stat-card.accent-card .stat-val { color:var(--accent); }
.stat-lbl {
  font-size:clamp(8px,.65vw,10px); font-weight:600;
  letter-spacing:.1em; text-transform:uppercase; color:var(--subtle);
}

/* Certifications */
.certs { display:flex; flex-wrap:wrap; gap:7px; }
.cert-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:clamp(4px,.6vh,7px) clamp(8px,.9vw,12px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:50px;
}
.cert-badge svg { width:12px; height:12px; stroke:var(--accent); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.cert-badge span { font-size:clamp(9px,.72vw,11px); font-weight:600; color:var(--muted); }

/* Footer */
.footer-left {
  position:relative; z-index:1; flex-shrink:0;
  padding-top:clamp(10px,1.5vh,16px); border-top:1px solid var(--border);
  margin-top:clamp(10px,1.5vh,16px);
}
.address { font-size:clamp(9px,.72vw,12px); color:var(--subtle); }

/* ── RECHTS — REFERENZPROJEKTE ──────────────────────────────── */
.col-right {
  display:flex; flex-direction:column;
  padding:clamp(24px,3.5vh,48px) clamp(24px,3vw,48px);
  gap:clamp(10px,1.6vh,18px);
}
.right-header {
  flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
}
.right-title {
  font-size:clamp(9px,.72vw,11px); font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; color:var(--subtle);
}
.warranty-badge {
  display:flex; align-items:center; gap:6px;
  padding:clamp(5px,.7vh,8px) clamp(10px,1.1vw,16px);
  background:oklch(from var(--accent) 0.97 0.02 h);
  border:1px solid oklch(from var(--accent) l c h / .25);
  border-radius:50px;
}
.warranty-badge svg { width:14px; height:14px; stroke:var(--accent); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.warranty-text { font-size:clamp(9px,.75vw,12px); font-weight:700; color:var(--ink); }
.warranty-val  { font-size:clamp(9px,.75vw,12px); font-weight:900; color:var(--accent); }

/* Referenz-Karten */
.ref-cards { flex:1; min-height:0; display:flex; gap:clamp(8px,1vw,14px); }
.ref-card {
  flex:1; min-width:0; min-height:0;
  position:relative; border-radius:18px; overflow:hidden;
  display:flex; flex-direction:column; justify-content:flex-end;
}

/* Placeholder-Gradienten für Karten ohne Bild */
.ref-card:nth-child(1) .ref-placeholder {
  background:linear-gradient(160deg, oklch(0.78 0.06 70) 0%, oklch(0.64 0.08 50) 100%);
}
.ref-card:nth-child(2) .ref-placeholder {
  background:linear-gradient(160deg, oklch(0.74 0.05 215) 0%, oklch(0.62 0.08 225) 100%);
}
.ref-card:nth-child(3) .ref-placeholder {
  background:linear-gradient(160deg, oklch(0.76 0.06 155) 0%, oklch(0.62 0.08 165) 100%);
}

.ref-placeholder {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
}
.ref-placeholder svg {
  width:clamp(32px,4vw,56px); height:clamp(32px,4vw,56px);
  stroke:oklch(1 0 0 / .25); stroke-width:1; fill:none;
  stroke-linecap:round; stroke-linejoin:round;
}

.ref-img {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; object-position:center; display:block;
}

/* Overlay für Lesbarkeit */
.ref-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to top,
    oklch(0.12 0.02 250 / .85) 0%,
    oklch(0.12 0.02 250 / .35) 45%,
    transparent 75%);
}

/* Jahr-Badge oben rechts */
.ref-year-badge {
  position:absolute; top:clamp(10px,1.5vh,16px); right:clamp(10px,1.2vw,16px);
  padding:3px 10px; border-radius:50px;
  background:oklch(0.995 0 0 / .88);
  backdrop-filter:blur(12px) saturate(180%);
  -webkit-backdrop-filter:blur(12px) saturate(180%);
  font-size:clamp(9px,.72vw,11px); font-weight:700; color:var(--ink);
  border:1px solid oklch(1 0 0 / .4);
}

/* Karten-Content unten */
.ref-content {
  position:relative; z-index:1;
  padding:clamp(12px,1.8vh,20px) clamp(12px,1.4vw,18px);
  display:flex; flex-direction:column; gap:3px;
}
.ref-proj-name {
  font-size:clamp(11px,1.1vw,16px); font-weight:900; color:#fff;
  letter-spacing:-.01em; line-height:1.2;
}
.ref-location {
  font-size:clamp(9px,.75vw,12px); font-weight:400;
  color:oklch(1 0 0 / .7); display:flex; align-items:center; gap:5px;
}
.ref-location svg { width:10px; height:10px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.ref-units {
  display:inline-flex; align-items:center; gap:4px;
  margin-top:4px; padding:2px 8px; border-radius:50px;
  background:oklch(1 0 0 / .15); border:1px solid oklch(1 0 0 / .2);
  font-size:clamp(8px,.65vw,10px); font-weight:700; color:#fff;
  align-self:flex-start;
}

/* ── ANIMATIONEN ────────────────────────────────────────────── */
@keyframes up   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fade { from{opacity:0} to{opacity:1} }

.header       { animation:up   .55s cubic-bezier(.22,1,.36,1) .05s both }
.dev-hero     { animation:up   .6s  cubic-bezier(.22,1,.36,1) .1s  both }
.eyebrow      { animation:up   .55s cubic-bezier(.22,1,.36,1) .18s both }
.headline     { animation:up   .65s cubic-bezier(.22,1,.36,1) .24s both }
.description  { animation:up   .55s cubic-bezier(.22,1,.36,1) .3s  both }
.stats-grid   { animation:up   .55s cubic-bezier(.22,1,.36,1) .36s both }
.certs        { animation:up   .55s cubic-bezier(.22,1,.36,1) .42s both }
.footer-left  { animation:fade .4s  ease                       .5s  both }
.right-header { animation:fade .4s  ease                       .15s both }
.ref-cards    { animation:up   .7s  cubic-bezier(.22,1,.36,1) .22s both }

@media (prefers-reduced-motion:reduce) {
  *{animation:none!important;opacity:1!important;transform:none!important}
}
</style>
</head>
<body>
<div class="slide">

  <!-- LINKS -->
  <div class="col-left">
    <div class="header">
      <img class="dev-logo-small" id="devLogoSmall" src="" alt="">
      <span class="slide-num">Bautr&#228;ger</span>
    </div>

    <div class="dev-hero">
      <img class="dev-logo-large" id="devLogoLarge" src="" alt="">
      <div class="dev-name" id="devName">—</div>
      <div class="dev-tagline" id="devTagline">—</div>
    </div>

    <div class="content">
      <div class="eyebrow">Track Record</div>
      <h2 class="headline" id="headline">Erfahrung.<br>Vertrauen. Qualit&#228;t.</h2>
      <p class="description" id="description">—</p>

      <div class="stats-grid" id="statsGrid"></div>
      <div class="certs" id="certs"></div>
    </div>

    <div class="footer-left">
      <span class="address" id="address">—</span>
    </div>
  </div>

  <!-- RECHTS -->
  <div class="col-right">
    <div class="right-header">
      <span class="right-title">Referenzprojekte</span>
      <div class="warranty-badge">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="warranty-text">Gew&#228;hrleistung</span>
        <span class="warranty-val" id="warrantyVal">—</span>
      </div>
    </div>

    <div class="ref-cards" id="refCards"></div>
  </div>

</div>

<script>
function applyProject(P) {
  const r = document.documentElement;
  if (P.accent)    r.style.setProperty('--accent',     P.accent);
  if (P.accentHex) r.style.setProperty('--accent-hex', P.accentHex);

  const $ = id => document.getElementById(id);
  $('address').textContent = P.address || '';

  const df = P.developerFacts || {};
  const logo = P.developerLogo || '';

  // Logos
  $('devLogoSmall').src = logo;  $('devLogoSmall').alt = P.developer || '';
  $('devLogoLarge').src = logo;  $('devLogoLarge').alt = P.developer || '';

  // Dev-Name & Tagline
  $('devName').textContent    = P.developer || '';
  $('devTagline').textContent = df.description || '';

  // Warranty
  $('warrantyVal').textContent = df.warranty || '—';

  // KPI Stats
  const founded = df.founded ? (new Date().getFullYear() - parseInt(df.founded)) : null;
  const stats = [
    { v: founded ? founded + '\u00a0J.' : df.founded, l: 'Erfahrung', accent: true },
    { v: (df.projects || '—') + '',                   l: 'Projekte' },
    { v: (df.units    || '—') + '',                   l: 'Wohneinheiten' },
    { v: df.warranty  || '—',                         l: 'Gew\u00e4hrleistung' },
  ];
  const grid = $('statsGrid');
  grid.innerHTML = '';
  stats.forEach(s => {
    const d = document.createElement('div');
    d.className = 'stat-card' + (s.accent ? ' accent-card' : '');
    d.innerHTML =
      '<div class="stat-val">' + s.v + '</div>' +
      '<div class="stat-lbl">' + s.l + '</div>';
    grid.appendChild(d);
  });

  // Zertifizierungen
  const certsEl = $('certs');
  certsEl.innerHTML = '';
  (df.certifications || []).forEach(c => {
    const badge = document.createElement('div');
    badge.className = 'cert-badge';
    badge.innerHTML =
      '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' +
      '<span>' + c + '</span>';
    certsEl.appendChild(badge);
  });

  // Referenz-Karten
  const refs = $('refCards');
  refs.innerHTML = '';
  const references = (df.references || []).slice(0, 3);

  references.forEach((ref, i) => {
    const card = document.createElement('div');
    card.className = 'ref-card';

    // Placeholder
    const ph = document.createElement('div');
    ph.className = 'ref-placeholder';
    ph.innerHTML =
      '<svg viewBox="0 0 24 24">' +
        '<rect x="3" y="3" width="7" height="18"/>' +
        '<rect x="14" y="8" width="7" height="13"/>' +
        '<path d="M3 21h18"/>' +
      '</svg>';
    card.appendChild(ph);

    // Bild falls vorhanden
    if (ref.image) {
      const img = document.createElement('img');
      img.className = 'ref-img';
      img.src = ref.image;
      img.alt = ref.name;
      img.loading = 'lazy';
      card.appendChild(img);
    }

    // Overlay
    const ov = document.createElement('div');
    ov.className = 'ref-overlay';
    card.appendChild(ov);

    // Jahr-Badge
    if (ref.year) {
      const yr = document.createElement('div');
      yr.className = 'ref-year-badge';
      yr.textContent = 'Fertiggestellt ' + ref.year;
      card.appendChild(yr);
    }

    // Content
    const cnt = document.createElement('div');
    cnt.className = 'ref-content';
    cnt.innerHTML =
      '<div class="ref-proj-name">' + (ref.name || '—') + '</div>' +
      '<div class="ref-location">' +
        '<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
        (ref.location || '') +
      '</div>' +
      (ref.units ? '<div class="ref-units">' + ref.units + '\u00a0Einheiten</div>' : '');
    card.appendChild(cnt);

    refs.appendChild(card);
  });

  // Leer-Karten auffüllen wenn weniger als 3 Referenzen
  for (let i = references.length; i < 3; i++) {
    const empty = document.createElement('div');
    empty.className = 'ref-card';
    const ph = document.createElement('div');
    ph.className = 'ref-placeholder';
    ph.innerHTML = '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="18"/><rect x="14" y="8" width="7" height="13"/><path d="M3 21h18"/></svg>';
    empty.appendChild(ph);
    const ov = document.createElement('div');
    ov.className = 'ref-overlay';
    empty.appendChild(ov);
    const cnt = document.createElement('div');
    cnt.className = 'ref-content';
    cnt.innerHTML = '<div class="ref-proj-name" style="opacity:.4">Referenzprojekt</div>';
    empty.appendChild(cnt);
    refs.appendChild(empty);
  }
}

try { if (window.parent?.PROJECT) applyProject(window.parent.PROJECT); } catch(e){}
window.addEventListener('message', e => {
  if (e.data?.type === 'PROJECT_DATA') applyProject(e.data.data);
});
</script>
</body>
</html>
