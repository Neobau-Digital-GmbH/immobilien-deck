<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nächste Schritte</title>
<style>
:root {
  --bg:       oklch(0.98 0.005 85);
  --surface:  oklch(0.995 0.003 85);
  --ink:      oklch(0.18 0.02 250);
  --muted:    oklch(0.45 0.02 250);
  --subtle:   oklch(0.65 0.01 250);
  --border:   oklch(0.88 0.01 85);
  --accent:   oklch(0.55 0.13 160);
  --font:     "Roboto", system-ui, -apple-system, sans-serif;
  --mono:     ui-monospace, "SFMono-Regular", Menlo, monospace;
  --logo-header:  clamp(22px, 2.6vh, 38px);
  --pad-v:        clamp(24px, 3.5vh, 48px);
  --pad-h:        clamp(28px, 3.5vw, 56px);
  --header-gap:   clamp(20px, 3.5vh, 44px);
  --content-gap:  clamp(8px, 1.2vh, 16px);
  --fs-eyebrow:   clamp(9px, 0.75vw, 11px);
  --fs-headline:  clamp(1.5rem, 2.5vw, 3rem);
  --fs-subline:   clamp(0.9rem, 1.1vw, 1.25rem);
  --fs-body:      clamp(0.85rem, 1vw, 1.12rem);
  --fs-label:     clamp(9px, 0.72vw, 11px);
  --fs-kpiLg:     clamp(1.8rem, 3.2vw, 3.8rem);
  --fs-kpiSm:     clamp(1.1rem, 1.9vw, 2.2rem);
  --fs-mono:      clamp(11px, 0.95vw, 14px);
  --fs-monoLg:    clamp(1.3rem, 2.1vw, 2.6rem);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh; overflow:hidden;
  background:var(--bg); font-family:var(--font);
  -webkit-font-smoothing:antialiased; color:var(--ink);
}
.slide { display:grid; grid-template-columns:50fr 50fr; width:100vw; height:100vh; }

/* ── LINKE SPALTE ─────────────────────────────────────────── */
.col-left {
  display:flex; flex-direction:column;
  padding:var(--pad-v) var(--pad-h);
  position:relative; overflow:hidden;
  border-right:1px solid var(--border);
}
.col-left::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(oklch(0.84 0.005 85) 1.2px, transparent 1.2px);
  background-size:28px 28px;
  mask-image:linear-gradient(160deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,0) 55%);
  -webkit-mask-image:linear-gradient(160deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,0) 55%);
}
.col-left::after {
  content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:3px; border-radius:0 3px 3px 0; background:var(--accent); opacity:.5;
}

.header {
  position:relative; z-index:1; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:var(--header-gap);
}
.dev-logo    { height:var(--logo-header); width:auto; object-fit:contain; }
.slide-label { font-size:var(--fs-label); font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--subtle); }

.content {
  position:relative; z-index:1;
  flex:1; display:flex; flex-direction:column;
  gap:var(--content-gap); min-height:0;
}
.eyebrow {
  display:flex; align-items:center; gap:8px; flex-shrink:0;
  font-size:var(--fs-eyebrow); font-weight:700;
  letter-spacing:.22em; text-transform:uppercase; color:var(--accent);
}
.eyebrow::before {
  content:''; width:clamp(14px,1.6vw,22px); height:2px;
  background:var(--accent); border-radius:2px; flex-shrink:0;
}
.headline { font-size:var(--fs-headline); font-weight:900; letter-spacing:-.025em; line-height:1.05; color:var(--ink); flex-shrink:0; }

/* 2×2 Step-Cards */
.steps-grid {
  flex:1; min-height:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:clamp(8px,1.1vh,14px);
}
.step-card {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; gap:clamp(8px,1.1vh,14px);
  padding:clamp(14px,2vh,24px) clamp(12px,1.3vw,18px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; position:relative; overflow:hidden;
}
/* Schritt-Nummer als kleines Label oben-links */
.step-num {
  position:absolute; top:clamp(8px,1.1vh,13px); left:clamp(10px,1.2vw,14px);
  font-family:var(--mono); font-size:clamp(8px,.62vw,10px);
  font-weight:700; color:var(--subtle); letter-spacing:.1em;
}
/* Top-Linie als dekorativer Akzent */
.step-card::before {
  content:''; position:absolute; top:0; left:12%; right:12%; height:2px;
  background:linear-gradient(90deg, transparent, oklch(0.84 0.005 85), transparent);
}
/* Finale Karte (Übergabe) */
.step-card.final {
  background:oklch(from var(--accent) 0.97 0.02 h);
  border-color:oklch(from var(--accent) l c h / .3);
}
.step-card.final::before {
  background:linear-gradient(90deg, transparent, oklch(from var(--accent) l c h / .45), transparent);
}
.step-card.final .step-num { color:oklch(from var(--accent) 0.55 0.08 h); }

/* Großes Icon */
.step-icon {
  width:clamp(40px,4.5vw,60px); height:clamp(40px,4.5vw,60px);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  background:oklch(from var(--accent) l c h / .1);
  border:1.5px solid oklch(from var(--accent) l c h / .22);
  border-radius:clamp(12px,1.4vw,18px);
}
.step-icon svg {
  width:52%; height:52%;
  stroke:var(--accent); stroke-width:1.7; fill:none;
  stroke-linecap:round; stroke-linejoin:round;
}
.step-card.final .step-icon {
  background:oklch(from var(--accent) l c h / .15);
  border-color:oklch(from var(--accent) l c h / .3);
}

.step-label { font-size:var(--fs-subline); font-weight:900; color:var(--ink); line-height:1.1; }
.step-card.final .step-label { color:var(--accent); }
.step-desc  { font-size:var(--fs-label); color:var(--muted); line-height:1.45; }

/* FOOTER */
.footer-left {
  position:relative; z-index:1; flex-shrink:0;
  margin-top:clamp(12px,2vh,24px); padding-top:clamp(10px,1.5vh,18px);
  border-top:1px solid var(--border);
}
.address { font-size:var(--fs-label); color:var(--subtle); }

/* ── RECHTE SPALTE: KONTAKT + CTA ────────────────────────── */
.col-right {
  display:flex; flex-direction:column;
  padding:var(--pad-v) var(--pad-h);
  position:relative; overflow:hidden;
}
.col-right::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 100% 80% at 80% 50%,
    oklch(from var(--accent) l c h / .06) 0%, transparent 65%);
}

.contact-block {
  position:relative; z-index:1; flex:1;
  display:flex; flex-direction:column;
  justify-content:center; gap:clamp(16px,2.8vh,36px);
}

/* Kontaktperson */
.contact-person { display:flex; align-items:center; gap:clamp(14px,1.8vw,24px); }
.contact-photo {
  width:clamp(52px,6vw,80px); height:clamp(52px,6vw,80px);
  border-radius:50%; overflow:hidden; flex-shrink:0;
  border:2px solid var(--border); background:oklch(0.92 0.01 250);
  display:flex; align-items:center; justify-content:center;
}
.contact-photo img { width:100%; height:100%; object-fit:cover; }
.contact-initials { font-size:clamp(.9rem,1.6vw,1.8rem); font-weight:900; color:var(--accent); }
.contact-info { display:flex; flex-direction:column; gap:2px; }
.contact-name  { font-size:var(--fs-subline); font-weight:900; color:var(--ink); letter-spacing:-.01em; line-height:1.1; }
.contact-title { font-size:var(--fs-body); font-weight:400; color:var(--muted); }

/* Kontakt-Zeilen */
.contact-details { display:flex; flex-direction:column; gap:clamp(8px,1.2vh,14px); }
.contact-row {
  display:flex; align-items:center; gap:clamp(10px,1.2vw,16px); text-decoration:none;
}
.contact-icon {
  width:clamp(30px,2.8vw,40px); height:clamp(30px,2.8vw,40px); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  transition:background .2s, border-color .2s;
}
.contact-icon svg { width:15px; height:15px; stroke:var(--accent); stroke-width:1.8; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.contact-row:hover .contact-icon { background:oklch(from var(--accent) l c h / .1); border-color:oklch(from var(--accent) l c h / .3); }
.contact-text { font-size:var(--fs-body); font-weight:500; color:var(--ink); }

/* CTA Buttons */
.cta-block { display:flex; flex-direction:column; gap:clamp(8px,1.2vh,14px); }
.btn-primary {
  display:flex; align-items:center; justify-content:center; gap:10px;
  padding:clamp(13px,1.8vh,19px) clamp(20px,2.5vw,36px);
  background:var(--accent); border:none; border-radius:14px;
  color:#fff; font-family:var(--font); font-size:var(--fs-body);
  font-weight:700; letter-spacing:.02em; cursor:pointer; text-decoration:none;
  box-shadow:0 4px 24px oklch(from var(--accent) l c h / .30),
             0 1px 0 oklch(1 0 0 / .15) inset;
  transition:transform .2s cubic-bezier(.4,0,.2,1), box-shadow .2s;
}
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 36px oklch(from var(--accent) l c h / .42), 0 1px 0 oklch(1 0 0 / .15) inset; }
.btn-primary:active { transform:scale(.98); }
.btn-primary svg { width:17px; height:17px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.btn-secondary {
  display:flex; align-items:center; justify-content:center; gap:8px;
  padding:clamp(10px,1.4vh,16px) clamp(20px,2.5vw,36px);
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:12px; color:var(--muted); font-family:var(--font);
  font-size:var(--fs-body); font-weight:600; cursor:pointer; text-decoration:none;
  transition:border-color .2s, color .2s, background .2s;
}
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); background:oklch(from var(--accent) l c h / .05); }
.btn-secondary svg { width:14px; height:14px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

/* QR-Code */
.qr-row {
  display:flex; align-items:center; gap:clamp(12px,1.5vw,20px);
  padding:clamp(10px,1.4vh,16px) clamp(14px,1.6vw,22px);
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
}
.qr-img { width:clamp(48px,5.5vw,68px); height:clamp(48px,5.5vw,68px); flex-shrink:0; border-radius:6px; }
.qr-text { display:flex; flex-direction:column; gap:3px; }
.qr-label { font-size:var(--fs-label); font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--subtle); }
.qr-hint  { font-size:var(--fs-body); font-weight:500; color:var(--muted); }

/* ── ANIMATIONEN ─────────────────────────────────────────── */
@keyframes up   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
@keyframes fade { from{opacity:0} to{opacity:1} }

.header          { animation:up   .55s cubic-bezier(.22,1,.36,1) .05s both }
.eyebrow         { animation:up   .55s cubic-bezier(.22,1,.36,1) .12s both }
.headline        { animation:up   .65s cubic-bezier(.22,1,.36,1) .20s both }
.footer-left     { animation:fade .4s  ease                       .55s both }
.contact-person  { animation:up   .65s cubic-bezier(.22,1,.36,1) .20s both }
.contact-details { animation:up   .6s  cubic-bezier(.22,1,.36,1) .30s both }
.cta-block       { animation:up   .6s  cubic-bezier(.22,1,.36,1) .40s both }
.qr-row          { animation:up   .55s cubic-bezier(.22,1,.36,1) .50s both }

.step-card:nth-child(1) { animation:up .55s cubic-bezier(.22,1,.36,1) .26s both }
.step-card:nth-child(2) { animation:up .55s cubic-bezier(.22,1,.36,1) .32s both }
.step-card:nth-child(3) { animation:up .55s cubic-bezier(.22,1,.36,1) .38s both }
.step-card:nth-child(4) { animation:up .55s cubic-bezier(.22,1,.36,1) .44s both }

@media (prefers-reduced-motion:reduce) {
  * { animation:none !important; opacity:1 !important; transform:none !important }
}
</style>
</head>
<body>
<div class="slide">

  <!-- LINKS: PROZESS -->
  <div class="col-left">
    <div class="header">
      <img class="dev-logo" id="devLogo" src="" alt="">
      <span class="slide-label">N&#228;chste Schritte</span>
    </div>
    <div class="content">
      <div class="eyebrow">Ihr Weg zur Wohnung</div>
      <h2 class="headline" id="headline">So geht es weiter.</h2>
      <div class="steps-grid" id="stepsGrid"></div>
    </div>
    <div class="footer-left">
      <span class="address" id="address">&#8212;</span>
    </div>
  </div>

  <!-- RECHTS: KONTAKT + CTA -->
  <div class="col-right">
    <div class="contact-block">
      <div class="contact-person">
        <div class="contact-photo">
          <img id="contactPhotoImg" src="" alt="" style="display:none">
          <div class="contact-initials" id="contactInitials">&#8212;</div>
        </div>
        <div class="contact-info">
          <div class="contact-name"  id="contactName">&#8212;</div>
          <div class="contact-title" id="contactTitle">&#8212;</div>
        </div>
      </div>

      <div class="contact-details">
        <a class="contact-row" id="phoneRow" href="#">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.82a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          </div>
          <span class="contact-text" id="contactPhone">&#8212;</span>
        </a>
        <a class="contact-row" id="emailRow" href="#">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <span class="contact-text" id="contactEmail">&#8212;</span>
        </a>
      </div>

      <div class="cta-block" id="ctaBlock"></div>

      <div class="qr-row" id="qrRow" style="display:none">
        <img class="qr-img" id="qrImg" src="" alt="QR Code">
        <div class="qr-text">
          <span class="qr-label">Terminbuchung</span>
          <span class="qr-hint">QR-Code scannen f&#252;r direkte Buchung</span>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
function applyUITokens(ui) {
  if (!ui) return;
  const r = document.documentElement;
  if (ui.fontSans)   r.style.setProperty('--font',        ui.fontSans);
  if (ui.fontMono)   r.style.setProperty('--font-mono',   ui.fontMono);
  if (ui.logoHeader) r.style.setProperty('--logo-header', ui.logoHeader);
  if (ui.type) Object.entries(ui.type).forEach(([k, v]) =>
    r.style.setProperty('--fs-' + k, v)
  );
}

function getInitials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w => w[0].toUpperCase()).slice(0,2).join('');
}

const STEP_ICONS = [
  '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="13" x2="12" y2="17"/><line x1="10" y1="15" x2="14" y2="15"/>',
  '<rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>',
  '<path d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/>',
  '<path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>',
];

function applyProject(P) {
  const r = document.documentElement;
  if (P.accent)    r.style.setProperty('--accent',     P.accent);
  if (P.accentHex) r.style.setProperty('--accent-hex', P.accentHex);

  const $ = id => document.getElementById(id);
  $('devLogo').src = P.developerLogo || '';
  $('devLogo').alt = P.developer     || '';
  $('address').textContent = P.address || '';

  const ns = P.nextSteps || {};
  $('headline').textContent = ns.headline || 'So geht es weiter.';

  // Step-Cards 2×2
  const grid = $('stepsGrid');
  grid.innerHTML = '';
  const steps = ns.processSteps || [
    { step:'01', label:'Reservierung',  desc:'Verbindliche Reservierung mit \u20ac\u00a0' + (ns.reservationFee||'2.500') },
    { step:'02', label:'Finanzierung',  desc:'Finanzierungsbest\u00e4tigung innerhalb von ' + (ns.reservationDuration||'14 Tagen') },
    { step:'03', label:'Notar',         desc:'Kaufvertrag und Beurkundung beim Notar' },
    { step:'04', label:'\u00dcbergabe', desc:'Schl\u00fcsseltermin nach Fertigstellung ' + (P.completionDate||'') },
  ];

  steps.slice(0,4).forEach((s, i) => {
    const isFinal = i === steps.length - 1 || i === 3;
    const card = document.createElement('div');
    card.className = 'step-card' + (isFinal ? ' final' : '');
    card.innerHTML =
      '<span class="step-num">' + (s.step || String(i+1).padStart(2,'0')) + '</span>' +
      '<div class="step-icon">' +
        '<svg viewBox="0 0 24 24">' + (STEP_ICONS[i] || STEP_ICONS[0]) + '</svg>' +
      '</div>' +
      '<div class="step-label">' + (s.label || '') + '</div>' +
      '<div class="step-desc">'  + (s.desc  || '') + '</div>';
    grid.appendChild(card);
  });

  // Kontakt
  const name    = ns.contactName  || '';
  const title   = ns.contactTitle || '';
  const phone   = ns.contactPhone || '';
  const email   = ns.contactEmail || '';
  const photo   = ns.contactPhoto || '';
  const booking = ns.bookingUrl   || '';
  const showBtn = ns.showBookingButton !== false; // default true

  $('contactName').textContent  = name;
  $('contactTitle').textContent = title;
  $('contactPhone').textContent = phone;
  $('contactEmail').textContent = email;
  $('contactInitials').textContent = getInitials(name);

  if (photo) {
    const img = $('contactPhotoImg');
    img.src = photo; img.alt = name; img.style.display = 'block';
    $('contactInitials').style.display = 'none';
  }
  if (phone) $('phoneRow').href = 'tel:' + phone.replace(/\s/g,'');
  if (email) $('emailRow').href = 'mailto:' + email;

  // CTA-Buttons dynamisch
  const cta = $('ctaBlock');
  cta.innerHTML = '';

  // Termin-Button nur wenn showBookingButton: true UND URL vorhanden
  if (showBtn && booking && !booking.includes('PLACEHOLDER')) {
    const btnP = document.createElement('a');
    btnP.className = 'btn-primary';
    btnP.href = booking;
    btnP.target = '_blank';
    btnP.innerHTML =
      '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/>' +
      '<line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>' +
      '<line x1="3" y1="10" x2="21" y2="10"/></svg>Termin vereinbaren';
    cta.appendChild(btnP);

    // QR nur wenn Termin-Button auch angezeigt wird
    $('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=6&data='
                     + encodeURIComponent(booking);
    $('qrRow').style.display = 'flex';
  }

  // Reservierungs-Button immer
  if (email) {
    const btnS = document.createElement('a');
    btnS.className = 'btn-secondary';
    btnS.href = 'mailto:' + email
      + '?subject=' + encodeURIComponent('Reservierungsanfrage ' + (P.name||''))
      + '&body='    + encodeURIComponent('Guten Tag,\n\nich m\u00f6chte eine Wohneinheit reservieren.\n\nMit freundlichen Gr\u00fc\u00dfen');
    btnS.innerHTML =
      '<svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>' +
      '<polyline points="22,6 12,13 2,6"/></svg>Reservierung per E-Mail';
    cta.appendChild(btnS);
  }
}

try { if (window.parent?.PROJECT) {
  applyProject(window.parent.PROJECT);
  applyUITokens(window.parent.PROJECT?.ui);
}} catch(e) {}

window.addEventListener('message', e => {
  if (e.data?.type === 'PROJECT_DATA') {
    applyProject(e.data.data);
    applyUITokens(e.data.ui);
  }
});
</script>
</body>
</html>
