<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Das Projekt</title>
<style>
:root {
  --bg:       oklch(0.98 0.005 85);
  --surface:  oklch(0.995 0.003 85);
  --ink:      oklch(0.18 0.02 250);
  --muted:    oklch(0.45 0.02 250);
  --subtle:   oklch(0.65 0.01 250);
  --border:   oklch(0.88 0.01 85);
  --accent:   oklch(0.55 0.13 160);
  --img-bg:   oklch(0.80 0.04 65);
  --font:     "Roboto", system-ui, -apple-system, sans-serif;
  --mono:     ui-monospace, "SFMono-Regular", Menlo, monospace;
  --logo-header: clamp(22px, 2.6vh, 38px);
  --fs-eyebrow:  clamp(9px, 0.75vw, 11px);
  --fs-headline: clamp(1.5rem, 2.5vw, 3rem);
  --fs-subline:  clamp(0.9rem, 1.1vw, 1.25rem);
  --fs-body:     clamp(0.85rem, 1vw, 1.12rem);
  --fs-label:    clamp(9px, 0.72vw, 11px);
  --fs-kpiLg:    clamp(1.8rem, 3.2vw, 3.8rem);
  --fs-kpiSm:    clamp(1.1rem, 1.9vw, 2.2rem);
  --fs-mono:     clamp(11px, 0.95vw, 14px);
  --fs-monoLg:   clamp(1.3rem, 2.1vw, 2.6rem);
  --pad-v:        clamp(24px, 3.5vh, 48px);
  --pad-h:        clamp(28px, 3.5vw, 56px);
  --header-gap:   clamp(20px, 3.5vh, 44px);
  --content-gap:  clamp(8px, 1.2vh, 16px);   /* Abstand zwischen Eyebrow/Headline/Subline */
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh; overflow:hidden;
  background:var(--bg); font-family:var(--font);
  -webkit-font-smoothing:antialiased; color:var(--ink);
}
.slide {
  display:grid; grid-template-columns:46fr 54fr;
  width:100vw; height:100vh;
}

/* ── LINKE SPALTE ─────────────────────────────────────────── */
.col-left {
  display:flex; flex-direction:column;
  padding:var(--pad-v) var(--pad-h);
  position:relative; overflow:hidden;
  border-right:1px solid var(--border);
}
.col-left::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(oklch(0.84 0.005 85) 1.2px, transparent 1.2px);
  background-size:28px 28px;
  mask-image:linear-gradient(160deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,0) 55%);
  -webkit-mask-image:linear-gradient(160deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,0) 55%);
}
.col-left::after {
  content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:3px; border-radius:0 3px 3px 0;
  background:var(--accent); opacity:.5;
}

/* HEADER */
.header {
  position:relative; z-index:1; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:var(--header-gap);
}
.dev-logo    { height:var(--logo-header); width:auto; object-fit:contain; }
.slide-label {
  font-size:var(--fs-label); font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; color:var(--subtle);
}

/* CONTENT */
.content {
  position:relative; z-index:1;
  flex:1; display:flex; flex-direction:column;
  gap:var(--content-gap); min-height:0;
}

.eyebrow {
  display:flex; align-items:center; gap:8px; flex-shrink:0;
  font-size:var(--fs-eyebrow); font-weight:700;
  letter-spacing:.22em; text-transform:uppercase; color:var(--accent);
}
.eyebrow::before {
  content:''; width:clamp(14px,1.6vw,22px); height:2px;
  background:var(--accent); border-radius:2px; flex-shrink:0;
}
.headline {
  font-size:var(--fs-headline); font-weight:900;
  letter-spacing:-.025em; line-height:1.05; color:var(--ink); flex-shrink:0;
}
.subline {
  font-size:var(--fs-subline); font-weight:400;
  color:var(--muted); line-height:1.5; flex-shrink:0;
}

/* Key-Stats: 4 Kacheln in einer Reihe */
.key-stats {
  display:flex; gap:clamp(6px,.8vw,10px); flex-shrink:0;
}
.key-stat {
  flex:1; display:flex; flex-direction:column; gap:3px;
  padding:clamp(9px,1.2vh,14px) clamp(9px,1vw,13px);
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  min-width:0;
}
.key-stat.accent {
  background:oklch(from var(--accent) 0.98 0.01 h);
  border-color:oklch(from var(--accent) l c h / .25);
}
.key-stat-v {
  font-family:var(--mono); font-size:var(--fs-mono); font-weight:900;
  color:var(--ink); line-height:1.1; font-variant-numeric:tabular-nums;
  white-space:nowrap;
}
.key-stat.accent .key-stat-v { color:var(--accent); }
.key-stat-l {
  font-size:var(--fs-label); font-weight:600;
  letter-spacing:.08em; text-transform:uppercase; color:var(--subtle);
}

/* Ausstattungs-Sektion */
.section-divider {
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.section-label {
  font-size:var(--fs-label); font-weight:700;
  letter-spacing:.16em; text-transform:uppercase; color:var(--subtle);
  white-space:nowrap;
}
.section-line { flex:1; height:1px; background:var(--border); }

/* Features 2-Spalten */
.features-grid {
  flex:1; display:grid;
  grid-template-columns:1fr 1fr;
  gap:clamp(6px,.9vh,10px);
  align-content:start; min-height:0;
}
.feature-item {
  display:flex; align-items:flex-start; gap:8px;
  padding:clamp(8px,1.1vh,13px) clamp(9px,1vw,13px);
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
}
.feature-check {
  flex-shrink:0;
  width:clamp(15px,1.4vw,19px); height:clamp(15px,1.4vw,19px);
  background:oklch(from var(--accent) l c h / .10);
  border:1px solid oklch(from var(--accent) l c h / .25);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  margin-top:1px;
}
.feature-check svg {
  width:58%; height:58%; stroke:var(--accent); stroke-width:2.5; fill:none;
  stroke-linecap:round; stroke-linejoin:round;
}
.feature-text {
  font-size:var(--fs-body); font-weight:400;
  color:var(--muted); line-height:1.35;
}

/* FOOTER */
.footer-left {
  position:relative; z-index:1; flex-shrink:0;
  margin-top:clamp(12px,2vh,24px);
  padding-top:clamp(10px,1.5vh,18px);
  border-top:1px solid var(--border);
}
.address { font-size:var(--fs-label); color:var(--subtle); }

/* ── RECHTE SPALTE: GALERIE ───────────────────────────────── */
.col-right {
  position:relative; overflow:hidden;
  background:var(--img-bg);
  border-radius:20px 0 0 20px;
}
/* Slides-Container */
.gallery-track {
  position:absolute; inset:0;
  display:flex; transition:none;
}
.gallery-slide {
  position:absolute; inset:0; opacity:0;
  transition:opacity .7s cubic-bezier(.4,0,.2,1);
}
.gallery-slide.active { opacity:1; z-index:1; }
.gallery-slide.prev   { opacity:0; z-index:0; }

.gallery-img {
  width:100%; height:100%; object-fit:cover; object-position:center; display:block;
}
.img-placeholder {
  position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 80% at 60% 40%,
    oklch(0.78 0.06 70) 0%, oklch(0.70 0.08 55) 50%, oklch(0.60 0.06 45) 100%);
}
.img-overlay {
  position:absolute; inset:0; pointer-events:none; z-index:2;
  background:
    linear-gradient(to right, oklch(0.15 0.02 250 / .12) 0%, transparent 35%),
    linear-gradient(to top,   oklch(0.15 0.02 250 / .30) 0%, transparent 35%);
}

/* Preis-Pill */
.price-pill {
  position:absolute; bottom:clamp(56px,9vh,90px); left:clamp(16px,2vw,28px);
  display:flex; flex-direction:column; gap:2px;
  padding:clamp(8px,1.2vh,14px) clamp(14px,1.6vw,22px);
  background:oklch(0.995 0 0 / .88);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid oklch(1 0 0 / .5); border-radius:14px;
  box-shadow:0 2px 16px oklch(0.2 0 0 / .10); z-index:3;
}
.price-pill-l {
  font-size:var(--fs-label); font-weight:700;
  letter-spacing:.1em; text-transform:uppercase; color:var(--subtle);
}
.price-pill-v {
  font-family:var(--mono); font-size:var(--fs-mono); font-weight:900;
  color:var(--ink); font-variant-numeric:tabular-nums;
}

/* Thumbnail-Leiste + Autoplay */
.gallery-bar {
  position:absolute; bottom:0; left:0; right:0; z-index:4;
  display:flex; align-items:center; justify-content:center; gap:6px;
  padding:clamp(8px,1.2vh,14px) clamp(12px,1.5vw,20px);
  background:linear-gradient(to top, oklch(0.1 0.01 250 / .55) 0%, transparent 100%);
}
.thumb {
  width:clamp(32px,3.8vw,52px); height:clamp(22px,2.8vh,36px);
  border-radius:6px; overflow:hidden; cursor:pointer; flex-shrink:0;
  border:2px solid oklch(1 0 0 / .25);
  transition:border-color .2s, transform .2s, opacity .2s;
  opacity:.65;
}
.thumb:hover  { opacity:.9; transform:scale(1.06); }
.thumb.active { border-color:var(--accent); opacity:1; transform:scale(1.08); }
.thumb img    { width:100%; height:100%; object-fit:cover; display:block; }
/* Farb-Platzhalter für Thumbs ohne Bild */
.thumb-ph { width:100%; height:100%; }

/* Play / Pause */
.play-btn {
  width:clamp(24px,2.6vw,34px); height:clamp(24px,2.6vw,34px);
  border-radius:50%; background:oklch(0.995 0 0 / .2);
  border:1.5px solid oklch(1 0 0 / .35);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; margin-left:4px;
  transition:background .2s;
}
.play-btn:hover { background:oklch(0.995 0 0 / .35); }
.play-btn svg { width:45%; height:45%; stroke:none; fill:#fff; }

/* ── ANIMATIONEN ─────────────────────────────────────────── */
@keyframes up   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
@keyframes fade { from{opacity:0} to{opacity:1} }

.header          { animation:up   .55s cubic-bezier(.22,1,.36,1) .05s both }
.eyebrow         { animation:up   .55s cubic-bezier(.22,1,.36,1) .12s both }
.headline        { animation:up   .65s cubic-bezier(.22,1,.36,1) .20s both }
.subline         { animation:up   .55s cubic-bezier(.22,1,.36,1) .28s both }
.key-stats       { animation:up   .55s cubic-bezier(.22,1,.36,1) .34s both }
.section-divider { animation:fade .4s  ease                       .40s both }
.footer-left     { animation:fade .4s  ease                       .62s both }
.col-right       { animation:fade .8s  ease                       0s   both }
.price-pill      { animation:up   .55s cubic-bezier(.22,1,.36,1) .68s both }

.feature-item:nth-child(1) { animation:up .5s cubic-bezier(.22,1,.36,1) .42s both }
.feature-item:nth-child(2) { animation:up .5s cubic-bezier(.22,1,.36,1) .47s both }
.feature-item:nth-child(3) { animation:up .5s cubic-bezier(.22,1,.36,1) .52s both }
.feature-item:nth-child(4) { animation:up .5s cubic-bezier(.22,1,.36,1) .57s both }
.feature-item:nth-child(5) { animation:up .5s cubic-bezier(.22,1,.36,1) .62s both }
.feature-item:nth-child(6) { animation:up .5s cubic-bezier(.22,1,.36,1) .67s both }

@media (prefers-reduced-motion:reduce) {
  * { animation:none !important; opacity:1 !important; transform:none !important }
}
</style>
</head>
<body>
<div class="slide">

  <!-- LINKS -->
  <div class="col-left">
    <div class="header">
      <img class="dev-logo" id="devLogo" src="" alt="">
      <span class="slide-label">Das Projekt</span>
    </div>
    <div class="content">
      <div class="eyebrow">Projektübersicht</div>
      <h2 class="headline" id="headline">&#8212;</h2>
      <p  class="subline"  id="subline">&#8212;</p>
      <div class="key-stats" id="keyStats"></div>
      <div class="section-divider">
        <span class="section-label">Ausstattung</span>
        <div class="section-line"></div>
      </div>
      <div class="features-grid" id="featuresGrid"></div>
    </div>
    <div class="footer-left">
      <span class="address" id="address">&#8212;</span>
    </div>
  </div>

  <!-- RECHTS: GALERIE -->
  <div class="col-right" id="colRight">
    <div class="gallery-track" id="galleryTrack"></div>
    <div class="img-overlay"></div>
    <div class="price-pill">
      <span class="price-pill-l">Kaufpreis ab</span>
      <span class="price-pill-v" id="priceRange">&#8212;</span>
    </div>
    <div class="gallery-bar" id="galleryBar"></div>
  </div>

</div>
<script>
function applyUITokens(ui) {
  if (!ui) return;
  const r = document.documentElement;
  if (ui.fontSans)   r.style.setProperty('--font',        ui.fontSans);
  if (ui.fontMono)   r.style.setProperty('--font-mono',   ui.fontMono);
  if (ui.logoHeader) r.style.setProperty('--logo-header', ui.logoHeader);
  if (ui.type) Object.entries(ui.type).forEach(([k, v]) =>
    r.style.setProperty('--fs-' + k, v)
  );
}

function fmtK(n) {
  if (!n) return '\u2014';
  return n >= 1000000
    ? (n/1000000).toLocaleString('de', {maximumFractionDigits:1}) + '\u00a0Mio.'
    : Math.round(n/1000).toLocaleString('de') + '\u00a0T\u20ac';
}

function applyProject(P) {
  const r = document.documentElement;
  if (P.accent)    r.style.setProperty('--accent',     P.accent);
  if (P.accentHex) r.style.setProperty('--accent-hex', P.accentHex);

  const $ = id => document.getElementById(id);
  $('devLogo').src = P.developerLogo || '';
  $('devLogo').alt = P.developer     || '';
  $('address').textContent = P.address || '';

  $('headline').textContent = (P.units || '\u2014') + ' Eigentumswohnungen.';
  $('subline').textContent  =
    (P.rooms || '') +
    (P.sizesFrom && P.sizesTo
      ? ' \u00b7 ' + P.sizesFrom + '\u2013' + P.sizesTo + '\u00a0m\u00b2' : '') +
    (P.location ? ' \u00b7 ' + P.location : '');

  // Key-Stats
  const statsEl = $('keyStats');
  statsEl.innerHTML = '';
  [
    { v: P.units + '\u00a0WE',                                       l:'Einheiten' },
    { v: P.sizesFrom + '\u2013' + P.sizesTo + '\u00a0m\u00b2',       l:'Wohnfl\u00e4che' },
    { v: P.energyStandard || '\u2014',                                l:'Standard', accent:true },
    { v: P.completionDate  || '\u2014',                               l:'Erstbezug' },
  ].forEach(s => {
    const d = document.createElement('div');
    d.className = 'key-stat' + (s.accent ? ' accent' : '');
    d.innerHTML =
      '<span class="key-stat-v">' + s.v + '</span>' +
      '<span class="key-stat-l">' + s.l + '</span>';
    statsEl.appendChild(d);
  });

  // Features
  const grid = $('featuresGrid');
  grid.innerHTML = '';
  (P.projectFeatures || []).slice(0, 6).forEach(f => {
    const item = document.createElement('div');
    item.className = 'feature-item';
    item.innerHTML =
      '<div class="feature-check">' +
        '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' +
      '</div>' +
      '<span class="feature-text">' + f + '</span>';
    grid.appendChild(item);
  });

  // Preis
  if (P.priceFrom) {
    $('priceRange').textContent = fmtK(P.priceFrom) + (P.priceTo ? ' \u2013 ' + fmtK(P.priceTo) : '');
  }

  // Galerie aufbauen
  const imgs = P.images || {};
  const gallery = (imgs.gallery && imgs.gallery.length)
    ? imgs.gallery.filter(Boolean)
    : [imgs.rendering1, imgs.rendering2, imgs.rendering3].filter(Boolean);
  if (gallery.length) buildGallery(gallery);
}

/* ── Galerie-Logik ───────────────────────────────────────── */
let _gallery = [], _cur = 0, _timer = null, _playing = true;
const AUTOPLAY_MS = 4000;

function buildGallery(imgs) {
  _gallery = imgs;
  const track = document.getElementById('galleryTrack');
  const bar   = document.getElementById('galleryBar');
  track.innerHTML = ''; bar.innerHTML = '';

  // Slides (Crossfade)
  imgs.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'gallery-slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.className = 'gallery-img';
    img.src = src; img.alt = ''; img.loading = i === 0 ? 'eager' : 'lazy';
    slide.appendChild(img);
    track.appendChild(slide);
  });

  // Thumbnails
  const tc = ['oklch(0.78 0.06 70)','oklch(0.74 0.05 215)','oklch(0.76 0.06 155)',
               'oklch(0.72 0.07 30)','oklch(0.80 0.04 280)','oklch(0.75 0.06 120)'];
  imgs.forEach((src, i) => {
    const t = document.createElement('div');
    t.className = 'thumb' + (i === 0 ? ' active' : '');
    t.onclick = () => { goTo(i); if (_playing) { stopTimer(); startTimer(); } };
    const img = document.createElement('img');
    img.src = src; img.alt = ''; img.loading = 'lazy';
    t.appendChild(img);
    bar.appendChild(t);
  });

  // Play/Pause Button
  const btn = document.createElement('div');
  btn.className = 'play-btn'; btn.id = 'playBtn';
  btn.innerHTML = pauseIcon(); btn.onclick = togglePlay;
  bar.appendChild(btn);

  startTimer();

  // Pause on hover
  const col = document.getElementById('colRight');
  col.addEventListener('mouseenter', () => { if (_playing) stopTimer(); });
  col.addEventListener('mouseleave', () => { if (_playing) startTimer(); });
}

function goTo(idx) {
  const slides = document.querySelectorAll('.gallery-slide');
  const thumbs = document.querySelectorAll('.thumb');
  if (!slides.length) return;
  slides[_cur].classList.remove('active');
  thumbs[_cur] && thumbs[_cur].classList.remove('active');
  _cur = ((idx % _gallery.length) + _gallery.length) % _gallery.length;
  slides[_cur].classList.add('active');
  thumbs[_cur] && thumbs[_cur].classList.add('active');
}
function startTimer() { stopTimer(); _timer = setInterval(() => goTo(_cur + 1), AUTOPLAY_MS); }
function stopTimer()  { clearInterval(_timer); _timer = null; }
function togglePlay() {
  _playing = !_playing;
  const btn = document.getElementById('playBtn');
  if (_playing) { startTimer(); if (btn) btn.innerHTML = pauseIcon(); }
  else          { stopTimer();  if (btn) btn.innerHTML = playIcon();  }
}
function playIcon()  { return '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>'; }
function pauseIcon() { return '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>'; }

try { if (window.parent?.PROJECT) {
  applyProject(window.parent.PROJECT);
  applyUITokens(window.parent.PROJECT?.ui);
}} catch(e) {}

window.addEventListener('message', e => {
  if (e.data?.type === 'PROJECT_DATA') {
    applyProject(e.data.data);
    applyUITokens(e.data.ui);
  }
});
</script>
</body>
</html>
