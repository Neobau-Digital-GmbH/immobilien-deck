<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grundrisse & Einheiten</title>
<style>
:root {
  --bg:       oklch(0.98 0.005 85);
  --surface:  oklch(0.995 0.003 85);
  --ink:      oklch(0.18 0.02 250);
  --muted:    oklch(0.50 0.02 250);
  --subtle:   oklch(0.70 0.01 250);
  --border:   oklch(0.88 0.01 85);
  --accent:   oklch(0.55 0.13 160);
  --warn:     oklch(0.65 0.18 55);
  --sold:     oklch(0.72 0.01 250);
  --font:     "Roboto", system-ui, -apple-system, sans-serif;
  --mono:     ui-monospace, "SFMono-Regular", Menlo, monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh; overflow:hidden;
  background:var(--bg); font-family:var(--font);
  -webkit-font-smoothing:antialiased; color:var(--ink);
}

/* ── LAYOUT ──────────────────────────────────────────────── */
.slide {
  display:grid;
  grid-template-columns:32fr 68fr;
  width:100vw; height:100vh;
}

/* ── LINKS ───────────────────────────────────────────────── */
.col-left {
  display:flex; flex-direction:column;
  padding:clamp(24px,3.5vh,48px) clamp(22px,2.8vw,44px);
  position:relative; overflow:hidden;
  border-right:1px solid var(--border);
}
.col-left::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(oklch(0.84 0.005 85) 1.2px,transparent 1.2px);
  background-size:28px 28px;
  mask-image:linear-gradient(160deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 55%);
  -webkit-mask-image:linear-gradient(160deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 55%);
}
.col-left::after {
  content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:3px; border-radius:0 3px 3px 0;
  background:var(--accent); opacity:.5;
}
.header {
  position:relative; z-index:1; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:clamp(16px,3vh,40px);
}
.dev-logo  { height:clamp(22px,2.6vh,38px); width:auto; object-fit:contain; }
.slide-num { font-size:clamp(9px,.72vw,11px); font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--subtle); }

.content {
  position:relative; z-index:1;
  flex:1; display:flex; flex-direction:column;
  justify-content:center; gap:clamp(10px,1.8vh,22px);
}
.eyebrow {
  display:flex; align-items:center; gap:8px;
  font-size:clamp(9px,.75vw,12px); font-weight:700;
  letter-spacing:.22em; text-transform:uppercase; color:var(--accent);
}
.eyebrow::before {
  content:''; width:clamp(14px,1.6vw,22px); height:2px;
  background:var(--accent); border-radius:2px; flex-shrink:0;
}
.headline {
  font-size:clamp(1.4rem,2.4vw,2.8rem); font-weight:900;
  letter-spacing:-.025em; line-height:1.05; color:var(--ink);
}
.intro-text {
  font-size:clamp(.82rem,1vw,1.05rem); font-weight:300;
  color:var(--muted); line-height:1.6;
}

/* Verfügbarkeits-Summary */
.avail-summary {
  display:flex; flex-direction:column; gap:6px;
  padding:clamp(12px,1.6vh,18px) clamp(12px,1.3vw,18px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; position:relative; overflow:hidden;
}
.avail-summary::before {
  content:''; position:absolute; top:0; left:0; bottom:0;
  width:3px; background:var(--accent); border-radius:3px 0 0 3px; opacity:.7;
}
.avail-total-v {
  font-family:var(--mono); font-size:clamp(1.2rem,2vw,2.2rem);
  font-weight:900; color:var(--accent); line-height:1;
  font-variant-numeric:tabular-nums;
}
.avail-total-l {
  font-size:clamp(9px,.72vw,11px); font-weight:700;
  letter-spacing:.12em; text-transform:uppercase; color:var(--subtle);
}

/* Preis-Range */
.price-range {
  display:flex; flex-direction:column; gap:2px;
  padding:clamp(10px,1.4vh,16px) clamp(12px,1.3vw,18px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px;
}
.price-range-l { font-size:clamp(9px,.72vw,11px); font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--subtle); }
.price-range-v { font-family:var(--mono); font-size:clamp(.95rem,1.3vw,1.5rem); font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums; }

.footer-left {
  position:relative; z-index:1; flex-shrink:0;
  padding-top:clamp(10px,1.5vh,16px);
  border-top:1px solid var(--border);
  margin-top:clamp(10px,1.5vh,18px);
}
.address { font-size:clamp(10px,.8vw,13px); color:var(--subtle); }

/* ── RECHTS — EINHEITEN-CARDS ────────────────────────────── */
.col-right {
  display:flex; align-items:stretch;
  padding:clamp(20px,3vh,44px) clamp(20px,2.5vw,44px);
  gap:clamp(10px,1.2vw,18px);
}

/* Einzelne Einheiten-Karte */
.unit-card {
  flex:1; min-width:0;
  display:flex; flex-direction:column;
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; overflow:hidden;
  transition:box-shadow .2s, border-color .2s;
  position:relative;
}
.unit-card.featured {
  border-color:oklch(from var(--accent) l c h / .3);
  box-shadow:0 4px 24px oklch(from var(--accent) l c h / .10),
             0 1px 0 oklch(from var(--accent) l c h / .15) inset;
}
.unit-card.featured::before {
  content:''; position:absolute; top:0; left:8%; right:8%; height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}

/* Card Header */
.card-header {
  padding:clamp(14px,2vh,22px) clamp(14px,1.5vw,22px) clamp(10px,1.4vh,16px);
  flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.unit-type {
  font-size:clamp(.85rem,1.1vw,1.2rem); font-weight:900;
  color:var(--ink); letter-spacing:-.01em; line-height:1.1;
  margin-bottom:4px;
}
.unit-sqm {
  font-family:var(--mono); font-size:clamp(1.1rem,1.8vw,2rem);
  font-weight:900; color:var(--accent); letter-spacing:-.02em;
  font-variant-numeric:tabular-nums; line-height:1.1;
}
.unit-sqm-l {
  font-size:clamp(8px,.62vw,10px); font-weight:600;
  letter-spacing:.1em; text-transform:uppercase; color:var(--subtle);
}

/* Preis */
.card-price {
  padding:clamp(10px,1.4vh,16px) clamp(14px,1.5vw,22px);
  flex-shrink:0; border-bottom:1px solid var(--border);
}
.card-price-l {
  font-size:clamp(8px,.62vw,10px); font-weight:600;
  letter-spacing:.1em; text-transform:uppercase; color:var(--subtle);
  margin-bottom:3px;
}
.card-price-v {
  font-family:var(--mono); font-size:clamp(.85rem,1.1vw,1.15rem);
  font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums;
}

/* Features */
.card-features {
  padding:clamp(10px,1.3vh,16px) clamp(14px,1.5vw,22px);
  flex-shrink:0; display:flex; flex-direction:column;
  gap:5px; border-bottom:1px solid var(--border);
}
.feat-row {
  display:flex; align-items:center; gap:6px;
}
.feat-dot {
  width:5px; height:5px; border-radius:50%;
  background:var(--accent); flex-shrink:0; opacity:.7;
}
.feat-txt {
  font-size:clamp(9px,.78vw,12px); color:var(--muted); line-height:1.3;
}

/* Grundriss-Bild oder Placeholder */
.card-floorplan {
  flex:1; min-height:0;
  position:relative; overflow:hidden;
  background:oklch(0.95 0.005 85);
  display:flex; align-items:center; justify-content:center;
}
.floorplan-img {
  width:100%; height:100%; object-fit:contain; padding:8px; display:block;
}
.floorplan-placeholder {
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:8px; width:100%; height:100%;
}
.floorplan-placeholder svg {
  width:clamp(48px,5vw,72px); height:clamp(48px,5vw,72px);
  opacity:.18; stroke:var(--ink); stroke-width:1.2; fill:none;
  stroke-linecap:round; stroke-linejoin:round;
}
.floorplan-hint {
  font-size:clamp(8px,.62vw,10px); color:var(--subtle);
  letter-spacing:.06em; text-transform:uppercase;
}

/* Verfügbarkeits-Footer */
.card-avail {
  padding:clamp(9px,1.2vh,14px) clamp(14px,1.5vw,22px);
  flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
}
.avail-badge {
  display:inline-flex; align-items:center; gap:6px;
  padding:3px 10px; border-radius:50px;
  font-size:clamp(9px,.72vw,11px); font-weight:700;
}
.avail-badge.available {
  background:oklch(from var(--accent) l c h / .10);
  color:var(--accent);
  border:1px solid oklch(from var(--accent) l c h / .25);
}
.avail-badge.last {
  background:oklch(from var(--warn) l c h / .10);
  color:var(--warn);
  border:1px solid oklch(from var(--warn) l c h / .25);
}
.avail-badge.sold {
  background:oklch(0.94 0.005 85);
  color:var(--subtle);
  border:1px solid var(--border);
}
.avail-dot-sm {
  width:6px; height:6px; border-radius:50%;
  background:currentColor; flex-shrink:0;
}
.avail-dots {
  display:flex; gap:3px; align-items:center;
}
.avail-dot-unit {
  width:8px; height:8px; border-radius:50%;
  border:1.5px solid var(--border);
  transition:background .2s;
}
.avail-dot-unit.taken  { background:var(--border); }
.avail-dot-unit.free   { background:var(--accent); border-color:var(--accent); }

/* ── ANIMATIONEN ──────────────────────────────────────────── */
@keyframes up   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fade { from{opacity:0} to{opacity:1} }

.header        { animation:up   .55s cubic-bezier(.22,1,.36,1) .05s both }
.eyebrow       { animation:up   .55s cubic-bezier(.22,1,.36,1) .10s both }
.headline      { animation:up   .65s cubic-bezier(.22,1,.36,1) .18s both }
.intro-text    { animation:up   .55s cubic-bezier(.22,1,.36,1) .25s both }
.avail-summary { animation:up   .55s cubic-bezier(.22,1,.36,1) .30s both }
.price-range   { animation:up   .55s cubic-bezier(.22,1,.36,1) .36s both }
.footer-left   { animation:fade .4s  ease                       .55s both }

.unit-card:nth-child(1) { animation:up .6s cubic-bezier(.22,1,.36,1) .28s both }
.unit-card:nth-child(2) { animation:up .6s cubic-bezier(.22,1,.36,1) .38s both }
.unit-card:nth-child(3) { animation:up .6s cubic-bezier(.22,1,.36,1) .48s both }

@media (prefers-reduced-motion:reduce) {
  * { animation:none!important; opacity:1!important; transform:none!important }
}
</style>
</head>
<body>
<div class="slide">

  <!-- LINKS -->
  <div class="col-left">
    <div class="header">
      <img class="dev-logo" id="devLogo" src="" alt="">
      <span class="slide-num">Grundrisse</span>
    </div>
    <div class="content">
      <div class="eyebrow">Wohnungstypen</div>
      <h2 class="headline" id="headline">—</h2>
      <p  class="intro-text" id="introText">—</p>
      <div class="avail-summary">
        <span class="avail-total-v" id="availTotal">—</span>
        <span class="avail-total-l">Einheiten noch verf&#252;gbar</span>
      </div>
      <div class="price-range">
        <span class="price-range-l">Preisspanne</span>
        <span class="price-range-v" id="priceSpan">—</span>
      </div>
    </div>
    <div class="footer-left">
      <span class="address" id="address">—</span>
    </div>
  </div>

  <!-- RECHTS — UNIT CARDS -->
  <div class="col-right" id="colRight"></div>

</div>

<script>
function fmt(n) {
  if (!n) return '\u2014';
  return n >= 1000000
    ? (n/1000000).toLocaleString('de',{maximumFractionDigits:1})+'\u00a0Mio.'
    : Math.round(Number(n.toString().replace(/\./g,''))/1000 || n/1000).toLocaleString('de')+'\u00a0T\u20ac';
}

function fmtStr(s) {
  // Converts "325.000" string to formatted price
  if (!s) return '\u2014';
  const n = parseInt(s.replace(/\./g,''));
  return isNaN(n) ? s : (n >= 1000000
    ? (n/1000000).toLocaleString('de',{maximumFractionDigits:1})+'\u00a0Mio.'
    : Math.round(n/1000).toLocaleString('de')+'\u00a0T\u20ac');
}

function buildCard(u, index, totalTypes) {
  const avail = u.available || 0;
  const isFeatured = totalTypes === 3 && index === 1; // mittlere Karte hervorheben

  // Badge
  let badgeClass, badgeText;
  if (avail === 0)      { badgeClass='sold';      badgeText='Ausverkauft'; }
  else if (avail === 1) { badgeClass='last';      badgeText='Letzte Einheit'; }
  else                  { badgeClass='available'; badgeText=avail+' verf\u00fcgbar'; }

  // Verfügbarkeits-Dots (max 6 anzeigen)
  const maxDots = Math.min(u.available + 2, 8); // Gesamte als Platzhalter
  const totalDots = Math.max(avail + 1, 3);
  let dotsHtml = '';
  for (let i = 0; i < totalDots; i++) {
    dotsHtml += `<div class="avail-dot-unit ${i < avail ? 'free' : 'taken'}"></div>`;
  }

  // Floorplan
  let floorplanHtml;
  if (u.floorplan) {
    floorplanHtml = `<img class="floorplan-img" src="${u.floorplan}" alt="${u.type}" loading="lazy">`;
  } else {
    floorplanHtml = `
      <div class="floorplan-placeholder">
        <svg viewBox="0 0 80 60">
          <rect x="5" y="5"  width="32" height="22" rx="1"/>
          <rect x="5" y="33" width="20" height="22" rx="1"/>
          <rect x="43" y="5" width="32" height="50" rx="1"/>
          <line x1="25" y1="5"  x2="25" y2="27"/>
          <line x1="5"  y1="27" x2="37" y2="27"/>
          <line x1="43" y1="30" x2="75" y2="30"/>
        </svg>
        <span class="floorplan-hint">Grundriss</span>
      </div>`;
  }

  // Features
  const featsHtml = (u.features || []).map(f =>
    `<div class="feat-row"><div class="feat-dot"></div><span class="feat-txt">${f}</span></div>`
  ).join('');

  const card = document.createElement('div');
  card.className = 'unit-card' + (isFeatured ? ' featured' : '');
  card.innerHTML = `
    <div class="card-header">
      <div class="unit-type">${u.type || '\u2014'}</div>
      <div class="unit-sqm">${u.sqm || '\u2014'}</div>
      <div class="unit-sqm-l">Wohnfl\u00e4che</div>
    </div>
    <div class="card-price">
      <div class="card-price-l">Kaufpreis</div>
      <div class="card-price-v">${fmtStr(u.priceFrom)}&thinsp;&ndash;&thinsp;${fmtStr(u.priceTo)}</div>
    </div>
    <div class="card-features">${featsHtml}</div>
    <div class="card-floorplan">${floorplanHtml}</div>
    <div class="card-avail">
      <div class="avail-badge ${badgeClass}">
        <div class="avail-dot-sm"></div>${badgeText}
      </div>
      <div class="avail-dots">${dotsHtml}</div>
    </div>`;
  return card;
}

function applyProject(P) {
  const r = document.documentElement;
  if (P.accent)    r.style.setProperty('--accent',     P.accent);
  if (P.accentHex) r.style.setProperty('--accent-hex', P.accentHex);

  const $ = id => document.getElementById(id);
  $('devLogo').src = P.developerLogo || '';
  $('devLogo').alt = P.developer     || '';
  $('address').textContent = P.address || '';

  // Headline
  const types = P.unitTypes || [];
  $('headline').textContent =
    types.length + ' Wohnungstypen.\n' + (P.units || '') + ' Einheiten.';
  $('introText').textContent =
    (P.location ? P.location + ' \u00b7 ' : '') +
    (P.sizesFrom && P.sizesTo ? P.sizesFrom + '\u2013' + P.sizesTo + '\u00a0m\u00b2' : '') +
    (P.rooms ? ' \u00b7 ' + P.rooms : '');

  $('availTotal').textContent = P.availableUnits || '\u2014';

  // Preis-Range aus unitTypes
  if (types.length) {
    const first = types[0], last = types[types.length-1];
    $('priceSpan').textContent =
      fmtStr(first.priceFrom) + ' \u2013 ' + fmtStr(last.priceTo);
  }

  // Cards
  const col = $('colRight');
  col.innerHTML = '';
  types.forEach((u, i) => {
    col.appendChild(buildCard(u, i, types.length));
  });
}

try { if (window.parent?.PROJECT) applyProject(window.parent.PROJECT); } catch(e){}
window.addEventListener('message', e => {
  if (e.data?.type === 'PROJECT_DATA') applyProject(e.data.data);
});
</script>
</body>
</html>
