<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grundrisse & Einheiten</title>
<style>
:root {
  --bg:       oklch(0.98 0.005 85);
  --surface:  oklch(0.995 0.003 85);
  --ink:      oklch(0.18 0.02 250);
  --muted:    oklch(0.45 0.02 250);
  --subtle:   oklch(0.65 0.01 250);
  --border:   oklch(0.88 0.01 85);
  --accent:   oklch(0.55 0.13 160);
  --warn:     oklch(0.62 0.18 55);
  --font:     "Roboto", system-ui, -apple-system, sans-serif;
  --mono:     ui-monospace, "SFMono-Regular", Menlo, monospace;
  --logo-header: clamp(22px, 2.6vh, 38px);
  --fs-eyebrow:  clamp(9px, 0.75vw, 11px);
  --fs-headline: clamp(1.5rem, 2.5vw, 3rem);
  --fs-subline:  clamp(0.9rem, 1.1vw, 1.25rem);
  --fs-body:     clamp(0.85rem, 1vw, 1.12rem);
  --fs-label:    clamp(9px, 0.72vw, 11px);
  --fs-kpiLg:    clamp(1.8rem, 3.2vw, 3.8rem);
  --fs-kpiSm:    clamp(1.1rem, 1.9vw, 2.2rem);
  --fs-mono:     clamp(11px, 0.95vw, 14px);
  --fs-monoLg:   clamp(1.3rem, 2.1vw, 2.6rem);
  --pad-v:       clamp(24px, 3.5vh, 48px);
  --pad-h:       clamp(28px, 3.5vw, 56px);
  --header-gap:  clamp(20px, 3.5vh, 44px);
  --content-gap: clamp(8px, 1.2vh, 16px);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh; overflow:hidden;
  background:var(--bg); font-family:var(--font);
  -webkit-font-smoothing:antialiased; color:var(--ink);
}
.slide {
  display:grid; grid-template-columns:30fr 70fr;
  width:100vw; height:100vh;
}

/* ── LINKE SPALTE ─────────────────────────────────────────── */
.col-left {
  display:flex; flex-direction:column;
  padding:var(--pad-v) var(--pad-h);
  position:relative; overflow:hidden;
  border-right:1px solid var(--border);
}
.col-left::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(oklch(0.84 0.005 85) 1.2px, transparent 1.2px);
  background-size:28px 28px;
  mask-image:linear-gradient(160deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,0) 55%);
  -webkit-mask-image:linear-gradient(160deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,0) 55%);
}
.col-left::after {
  content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:3px; border-radius:0 3px 3px 0;
  background:var(--accent); opacity:.5;
}

/* HEADER */
.header {
  position:relative; z-index:1; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:var(--header-gap);
}
.dev-logo    { height:var(--logo-header); width:auto; object-fit:contain; }
.slide-label {
  font-size:var(--fs-label); font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; color:var(--subtle);
}

/* CONTENT */
.content {
  position:relative; z-index:1;
  flex:1; display:flex; flex-direction:column;
  gap:var(--content-gap); min-height:0;
}
.eyebrow {
  display:flex; align-items:center; gap:8px; flex-shrink:0;
  font-size:var(--fs-eyebrow); font-weight:700;
  letter-spacing:.22em; text-transform:uppercase; color:var(--accent);
}
.eyebrow::before {
  content:''; width:clamp(14px,1.6vw,22px); height:2px;
  background:var(--accent); border-radius:2px; flex-shrink:0;
}
.headline {
  font-size:var(--fs-headline); font-weight:900;
  letter-spacing:-.025em; line-height:1.05; color:var(--ink); flex-shrink:0;
}
.subline {
  font-size:var(--fs-subline); font-weight:400;
  color:var(--muted); line-height:1.5; flex-shrink:0;
}

/* Verfügbarkeits-Box */
.avail-box {
  display:flex; flex-direction:column; gap:3px;
  padding:clamp(10px,1.4vh,16px) clamp(12px,1.3vw,16px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; flex-shrink:0; position:relative; overflow:hidden;
}
.avail-box::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:var(--accent); opacity:.7;
  border-radius:3px 0 0 3px;
}
.avail-v {
  font-family:var(--mono); font-size:var(--fs-kpiSm); font-weight:900;
  color:var(--accent); line-height:1; font-variant-numeric:tabular-nums;
}
.avail-l {
  font-size:var(--fs-label); font-weight:700;
  letter-spacing:.1em; text-transform:uppercase; color:var(--subtle);
}

/* Preis-Box */
.price-box {
  display:flex; flex-direction:column; gap:3px;
  padding:clamp(10px,1.4vh,16px) clamp(12px,1.3vw,16px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; flex-shrink:0;
}
.price-l { font-size:var(--fs-label); font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--subtle); }
.price-v {
  font-family:var(--mono); font-size:var(--fs-mono); font-weight:700;
  color:var(--ink); font-variant-numeric:tabular-nums;
}

/* FOOTER */
.footer-left {
  position:relative; z-index:1; flex-shrink:0;
  margin-top:clamp(12px,2vh,24px);
  padding-top:clamp(10px,1.5vh,18px);
  border-top:1px solid var(--border);
}
.address { font-size:var(--fs-label); color:var(--subtle); }

/* ── RECHTE SPALTE: UNIT-CARDS ────────────────────────────── */
.col-right {
  display:flex; align-items:center;          /* vertikal zentriert */
  justify-content:center;
  padding:var(--pad-v) var(--pad-h);
  gap:clamp(10px,1.2vw,18px);
}

/* Einzelne Einheiten-Karte — kontrollierte Höhe */
.unit-card {
  flex:1; min-width:0;
  height:clamp(320px, 55vh, 560px);          /* Höhe begrenzt: kein Stretch auf 100vh */
  display:flex; flex-direction:column;
  background:var(--surface); border:1px solid var(--border);
  border-radius:18px; overflow:hidden; position:relative;
}
.unit-card.featured {
  border-color:oklch(from var(--accent) l c h / .35);
  box-shadow:0 4px 24px oklch(from var(--accent) l c h / .10);
}
.unit-card.featured::before {
  content:''; position:absolute; top:0; left:8%; right:8%; height:2px;
  background:var(--accent); opacity:.8;
}

/* Card Header */
.card-hdr {
  padding:clamp(12px,1.6vh,20px) clamp(14px,1.5vw,20px) clamp(8px,1.1vh,14px);
  flex-shrink:0; border-bottom:1px solid var(--border);
}
.unit-type {
  font-size:var(--fs-body); font-weight:900;
  color:var(--ink); letter-spacing:-.01em; line-height:1.1; margin-bottom:4px;
}
.unit-sqm {
  font-family:var(--mono); font-size:var(--fs-kpiSm); font-weight:900;
  color:var(--accent); letter-spacing:-.02em; font-variant-numeric:tabular-nums;
  line-height:1.1;
}
.unit-sqm-l {
  font-size:var(--fs-label); font-weight:600;
  letter-spacing:.1em; text-transform:uppercase; color:var(--subtle);
}

/* Preis */
.card-price {
  padding:clamp(8px,1.1vh,14px) clamp(14px,1.5vw,20px);
  flex-shrink:0; border-bottom:1px solid var(--border);
}
.card-price-l { font-size:var(--fs-label); font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--subtle); margin-bottom:3px; }
.card-price-v {
  font-family:var(--mono); font-size:var(--fs-mono); font-weight:700;
  color:var(--ink); font-variant-numeric:tabular-nums;
}

/* Features */
.card-feats {
  padding:clamp(8px,1.1vh,14px) clamp(14px,1.5vw,20px);
  flex-shrink:0; display:flex; flex-direction:column;
  gap:5px; border-bottom:1px solid var(--border);
}
.feat-row { display:flex; align-items:center; gap:6px; }
.feat-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); flex-shrink:0; opacity:.7; }
.feat-txt { font-size:var(--fs-body); color:var(--muted); line-height:1.3; }

/* Grundriss-Zone */
.card-fp {
  flex:1; min-height:0; position:relative; overflow:hidden;
  background:oklch(0.96 0.005 85);
  display:flex; align-items:center; justify-content:center;
}
.fp-img { width:100%; height:100%; object-fit:contain; padding:8px; display:block; }
.fp-ph {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:6px; width:100%; height:100%;
}
.fp-ph svg {
  width:clamp(40px,4.5vw,64px); height:clamp(40px,4.5vw,64px);
  opacity:.15; stroke:var(--ink); stroke-width:1.2; fill:none;
  stroke-linecap:round; stroke-linejoin:round;
}
.fp-ph span {
  font-size:var(--fs-label); color:var(--subtle);
  letter-spacing:.06em; text-transform:uppercase;
}

/* Verfügbarkeits-Footer der Card */
.card-avail {
  padding:clamp(8px,1.1vh,13px) clamp(14px,1.5vw,20px);
  flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
}
.avail-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 9px; border-radius:50px;
  font-size:var(--fs-label); font-weight:700;
}
.avail-badge.ok   { background:oklch(from var(--accent) l c h/.1); color:var(--accent); border:1px solid oklch(from var(--accent) l c h/.25); }
.avail-badge.last { background:oklch(from var(--warn) l c h/.1);   color:var(--warn);   border:1px solid oklch(from var(--warn) l c h/.25); }
.avail-badge.sold { background:oklch(0.94 0.005 85); color:var(--subtle); border:1px solid var(--border); }
.badge-dot { width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }
.avail-dots { display:flex; gap:3px; }
.a-dot { width:8px; height:8px; border-radius:50%; border:1.5px solid var(--border); }
.a-dot.free { background:var(--accent); border-color:var(--accent); }

/* ── ANIMATIONEN ─────────────────────────────────────────── */
@keyframes up   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
@keyframes fade { from{opacity:0} to{opacity:1} }

.header      { animation:up   .55s cubic-bezier(.22,1,.36,1) .05s both }
.eyebrow     { animation:up   .55s cubic-bezier(.22,1,.36,1) .12s both }
.headline    { animation:up   .65s cubic-bezier(.22,1,.36,1) .20s both }
.subline     { animation:up   .55s cubic-bezier(.22,1,.36,1) .28s both }
.avail-box   { animation:up   .55s cubic-bezier(.22,1,.36,1) .34s both }
.price-box   { animation:up   .55s cubic-bezier(.22,1,.36,1) .40s both }
.footer-left { animation:fade .4s  ease                       .55s both }

.unit-card:nth-child(1) { animation:up .6s cubic-bezier(.22,1,.36,1) .26s both }
.unit-card:nth-child(2) { animation:up .6s cubic-bezier(.22,1,.36,1) .36s both }
.unit-card:nth-child(3) { animation:up .6s cubic-bezier(.22,1,.36,1) .46s both }

@media (prefers-reduced-motion:reduce) {
  * { animation:none !important; opacity:1 !important; transform:none !important }
}
</style>
</head>
<body>
<div class="slide">

  <!-- LINKS -->
  <div class="col-left">
    <div class="header">
      <img class="dev-logo" id="devLogo" src="" alt="">
      <span class="slide-label">Grundrisse</span>
    </div>
    <div class="content">
      <div class="eyebrow">Wohnungstypen</div>
      <h2 class="headline" id="headline">&#8212;</h2>
      <p  class="subline"  id="subline">&#8212;</p>
      <div class="avail-box">
        <span class="avail-v" id="availTotal">&#8212;</span>
        <span class="avail-l">Einheiten verf&#252;gbar</span>
      </div>
      <div class="price-box">
        <span class="price-l">Preisspanne</span>
        <span class="price-v" id="priceSpan">&#8212;</span>
      </div>
    </div>
    <div class="footer-left">
      <span class="address" id="address">&#8212;</span>
    </div>
  </div>

  <!-- RECHTS: UNIT CARDS -->
  <div class="col-right" id="colRight"></div>

</div>
<script>
function applyUITokens(ui) {
  if (!ui) return;
  const r = document.documentElement;
  if (ui.fontSans)   r.style.setProperty('--font',        ui.fontSans);
  if (ui.fontMono)   r.style.setProperty('--font-mono',   ui.fontMono);
  if (ui.logoHeader) r.style.setProperty('--logo-header', ui.logoHeader);
  if (ui.type) Object.entries(ui.type).forEach(([k, v]) =>
    r.style.setProperty('--fs-' + k, v)
  );
}

function fmtStr(s) {
  if (!s) return '\u2014';
  const n = parseInt(String(s).replace(/\./g,''));
  return isNaN(n) ? s
    : n >= 1000000
      ? (n/1000000).toLocaleString('de',{maximumFractionDigits:1})+'\u00a0Mio.'
      : Math.round(n/1000).toLocaleString('de')+'\u00a0T\u20ac';
}

function buildCard(u, idx, total) {
  const avail    = u.available || 0;
  const featured = total === 3 && idx === 1;

  let badgeCls, badgeTxt;
  if      (avail === 0) { badgeCls='sold'; badgeTxt='Ausverkauft'; }
  else if (avail === 1) { badgeCls='last'; badgeTxt='Letzte Einheit'; }
  else                  { badgeCls='ok';   badgeTxt=avail+' verf\u00fcgbar'; }

  // Dots (max 5)
  const total_d = Math.min(avail + 2, 5);
  let dotsHtml = '';
  for (let i = 0; i < total_d; i++) {
    dotsHtml += '<div class="a-dot' + (i < avail ? ' free' : '') + '"></div>';
  }

  // Floorplan
  const fpHtml = u.floorplan
    ? '<img class="fp-img" src="' + u.floorplan + '" alt="' + (u.type||'') + '" loading="lazy">'
    : '<div class="fp-ph">' +
        '<svg viewBox="0 0 80 60">' +
          '<rect x="5" y="5" width="32" height="22" rx="1"/>' +
          '<rect x="5" y="33" width="20" height="22" rx="1"/>' +
          '<rect x="43" y="5" width="32" height="50" rx="1"/>' +
          '<line x1="25" y1="5" x2="25" y2="27"/>' +
          '<line x1="5" y1="27" x2="37" y2="27"/>' +
          '<line x1="43" y1="30" x2="75" y2="30"/>' +
        '</svg>' +
        '<span>Grundriss</span>' +
      '</div>';

  // Features
  const featsHtml = (u.features||[]).map(f =>
    '<div class="feat-row"><div class="feat-dot"></div>' +
    '<span class="feat-txt">' + f + '</span></div>'
  ).join('');

  const card = document.createElement('div');
  card.className = 'unit-card' + (featured ? ' featured' : '');
  card.innerHTML =
    '<div class="card-hdr">' +
      '<div class="unit-type">' + (u.type||'\u2014') + '</div>' +
      '<div class="unit-sqm">'  + (u.sqm ||'\u2014') + '</div>' +
      '<div class="unit-sqm-l">Wohnfl\u00e4che</div>' +
    '</div>' +
    '<div class="card-price">' +
      '<div class="card-price-l">Kaufpreis</div>' +
      '<div class="card-price-v">' +
        fmtStr(u.priceFrom) + '\u2009\u2013\u2009' + fmtStr(u.priceTo) +
      '</div>' +
    '</div>' +
    '<div class="card-feats">' + featsHtml + '</div>' +
    '<div class="card-fp">' + fpHtml + '</div>' +
    '<div class="card-avail">' +
      '<div class="avail-badge ' + badgeCls + '">' +
        '<div class="badge-dot"></div>' + badgeTxt +
      '</div>' +
      '<div class="avail-dots">' + dotsHtml + '</div>' +
    '</div>';
  return card;
}

function applyProject(P) {
  const r = document.documentElement;
  if (P.accent)    r.style.setProperty('--accent',     P.accent);
  if (P.accentHex) r.style.setProperty('--accent-hex', P.accentHex);

  const $ = id => document.getElementById(id);
  $('devLogo').src = P.developerLogo || '';
  $('devLogo').alt = P.developer     || '';
  $('address').textContent = P.address || '';

  const types = P.unitTypes || [];
  $('headline').textContent =
    types.length + ' Wohnungstypen \u00b7 ' + (P.units||'') + ' Einheiten.';
  $('subline').textContent =
    (P.location ? P.location + ' \u00b7 ' : '') +
    (P.sizesFrom && P.sizesTo ? P.sizesFrom+'\u2013'+P.sizesTo+'\u00a0m\u00b2' : '') +
    (P.rooms ? ' \u00b7 ' + P.rooms : '');

  $('availTotal').textContent = P.availableUnits || '\u2014';

  if (types.length) {
    const first = types[0], last = types[types.length-1];
    $('priceSpan').textContent = fmtStr(first.priceFrom) + ' \u2013 ' + fmtStr(last.priceTo);
  }

  const col = $('colRight');
  col.innerHTML = '';
  types.forEach((u, i) => col.appendChild(buildCard(u, i, types.length)));
}

try { if (window.parent?.PROJECT) {
  applyProject(window.parent.PROJECT);
  applyUITokens(window.parent.PROJECT?.ui);
}} catch(e) {}

window.addEventListener('message', e => {
  if (e.data?.type === 'PROJECT_DATA') {
    applyProject(e.data.data);
    applyUITokens(e.data.ui);
  }
});
</script>
</body>
</html>
