<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nächste Schritte</title>
<style>
:root {
  --bg:      oklch(0.98 0.005 85);
  --surface: oklch(0.995 0.003 85);
  --ink:     oklch(0.18 0.02 250);
  --muted:   oklch(0.50 0.02 250);
  --subtle:  oklch(0.70 0.01 250);
  --border:  oklch(0.88 0.01 85);
  --accent:  oklch(0.55 0.13 160);
  --pos:     oklch(0.48 0.15 155);
  --font:    "Roboto", system-ui, -apple-system, sans-serif;
  --mono:    ui-monospace, "SFMono-Regular", Menlo, monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh; overflow:hidden;
  background:var(--bg); font-family:var(--font);
  -webkit-font-smoothing:antialiased; color:var(--ink);
}
.slide {
  display:grid; grid-template-columns:46fr 54fr;
  width:100vw; height:100vh;
}

/* ── LINKS — PROZESS ────────────────────────────────────────── */
.col-left {
  display:flex; flex-direction:column;
  padding:clamp(24px,3.5vh,48px) clamp(24px,3vw,48px);
  position:relative; overflow:hidden;
  border-right:1px solid var(--border);
}
.col-left::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(oklch(0.84 0.005 85) 1.2px,transparent 1.2px);
  background-size:28px 28px;
  mask-image:linear-gradient(160deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,0) 55%);
  -webkit-mask-image:linear-gradient(160deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,0) 55%);
}
.col-left::after {
  content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:3px; border-radius:0 3px 3px 0;
  background:var(--accent); opacity:.5;
}

.header {
  position:relative; z-index:1; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:clamp(16px,2.8vh,36px);
}
.dev-logo  { height:clamp(22px,2.6vh,38px); width:auto; object-fit:contain; }
.slide-num { font-size:clamp(9px,.72vw,11px); font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--subtle); }

/* Intro */
.intro { position:relative; z-index:1; flex-shrink:0; margin-bottom:clamp(16px,2.8vh,36px); }
.eyebrow {
  display:flex; align-items:center; gap:8px; margin-bottom:8px;
  font-size:clamp(9px,.75vw,12px); font-weight:700;
  letter-spacing:.22em; text-transform:uppercase; color:var(--accent);
}
.eyebrow::before {
  content:''; width:clamp(14px,1.6vw,22px); height:2px;
  background:var(--accent); border-radius:2px; flex-shrink:0;
}
.headline {
  font-size:clamp(1.4rem,2.4vw,2.9rem); font-weight:900;
  letter-spacing:-.025em; line-height:1.05; color:var(--ink);
}

/* Prozess-Timeline */
.process { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; justify-content:center; gap:0; }
.proc-item { display:flex; gap:clamp(12px,1.5vw,20px); position:relative; }
.proc-left { display:flex; flex-direction:column; align-items:center; flex-shrink:0; }

/* Kreis */
.proc-circle {
  width:clamp(32px,3.2vw,44px); height:clamp(32px,3.2vw,44px);
  border-radius:50%; border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  background:var(--surface); flex-shrink:0;
  transition:background .3s, border-color .3s;
  position:relative; z-index:1;
}
.proc-circle.final {
  background:var(--accent); border-color:var(--accent);
}
.proc-num {
  font-family:var(--mono); font-size:clamp(10px,.85vw,13px);
  font-weight:900; color:var(--subtle); font-variant-numeric:tabular-nums;
}
.proc-circle.final .proc-num { color:#fff; }

/* Verbindungslinie */
.proc-line {
  width:2px; flex:1; min-height:clamp(16px,2.5vh,32px);
  background:var(--border); margin:3px 0;
}
.proc-line.final { background:var(--accent); opacity:.3; }

/* Text */
.proc-content { padding-bottom:clamp(14px,2.2vh,28px); display:flex; flex-direction:column; gap:3px; padding-top:clamp(5px,.8vh,9px); }
.proc-item:last-child .proc-content { padding-bottom:0; }
.proc-label { font-size:clamp(12px,1.1vw,16px); font-weight:900; color:var(--ink); line-height:1.1; }
.proc-item:last-child .proc-label { color:var(--accent); }
.proc-desc { font-size:clamp(10px,.82vw,12.5px); color:var(--muted); line-height:1.45; }

/* Footer */
.footer-left {
  position:relative; z-index:1; flex-shrink:0;
  padding-top:clamp(10px,1.5vh,16px); border-top:1px solid var(--border);
  margin-top:clamp(10px,1.5vh,16px);
}
.address { font-size:clamp(9px,.72vw,12px); color:var(--subtle); }

/* ── RECHTS — KONTAKT ───────────────────────────────────────── */
.col-right {
  display:flex; flex-direction:column;
  padding:clamp(24px,3.5vh,48px) clamp(28px,3.5vw,56px);
  gap:0; position:relative; overflow:hidden;
}

/* Subtiler Accent-Hintergrund rechts */
.col-right::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 100% 80% at 80% 50%,
    oklch(from var(--accent) l c h / .06) 0%, transparent 65%);
}

.contact-block {
  position:relative; z-index:1; flex:1; display:flex;
  flex-direction:column; justify-content:center;
  gap:clamp(16px,2.8vh,36px);
}

/* Foto + Name */
.contact-person { display:flex; align-items:center; gap:clamp(14px,1.8vw,24px); }
.contact-photo {
  width:clamp(56px,6.5vw,88px); height:clamp(56px,6.5vw,88px);
  border-radius:50%; overflow:hidden; flex-shrink:0;
  border:2px solid var(--border);
  background:oklch(0.92 0.01 250);
  display:flex; align-items:center; justify-content:center;
}
.contact-photo img { width:100%; height:100%; object-fit:cover; }
.contact-initials {
  font-size:clamp(1rem,1.8vw,2rem); font-weight:900; color:var(--accent);
}
.contact-info { display:flex; flex-direction:column; gap:2px; }
.contact-name  { font-size:clamp(1rem,1.5vw,1.8rem); font-weight:900; color:var(--ink); letter-spacing:-.01em; line-height:1.1; }
.contact-title { font-size:clamp(.78rem,.9vw,1.05rem); font-weight:400; color:var(--muted); }

/* Kontakt-Zeilen */
.contact-details { display:flex; flex-direction:column; gap:clamp(8px,1.2vh,14px); }
.contact-row {
  display:flex; align-items:center; gap:clamp(10px,1.2vw,16px);
  text-decoration:none;
}
.contact-icon {
  width:clamp(32px,3vw,42px); height:clamp(32px,3vw,42px); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  transition:background .2s, border-color .2s;
}
.contact-icon svg { width:16px; height:16px; stroke:var(--accent); stroke-width:1.8; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.contact-row:hover .contact-icon { background:oklch(from var(--accent) l c h / .1); border-color:oklch(from var(--accent) l c h / .3); }
.contact-text { font-size:clamp(11px,1vw,14px); font-weight:500; color:var(--ink); }

/* CTA Buttons */
.cta-block { display:flex; flex-direction:column; gap:clamp(8px,1.2vh,14px); }
.btn-primary {
  display:flex; align-items:center; justify-content:center; gap:10px;
  padding:clamp(14px,2vh,20px) clamp(20px,2.5vw,36px);
  background:var(--accent); border:none; border-radius:14px;
  color:#fff; font-family:var(--font);
  font-size:clamp(13px,1.1vw,17px); font-weight:700; letter-spacing:.03em;
  cursor:pointer; text-decoration:none;
  box-shadow:0 4px 24px oklch(from var(--accent) l c h / .30),
             0 1px 0 oklch(1 0 0 / .15) inset;
  transition:transform .2s cubic-bezier(.4,0,.2,1), box-shadow .2s;
}
.btn-primary:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 36px oklch(from var(--accent) l c h / .42),
             0 1px 0 oklch(1 0 0 / .15) inset;
}
.btn-primary:active { transform:scale(.98); }
.btn-primary svg { width:18px; height:18px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

.btn-secondary {
  display:flex; align-items:center; justify-content:center; gap:8px;
  padding:clamp(10px,1.4vh,16px) clamp(20px,2.5vw,36px);
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:12px; color:var(--muted); font-family:var(--font);
  font-size:clamp(12px,.98vw,15px); font-weight:600; letter-spacing:.02em;
  cursor:pointer; text-decoration:none;
  transition:border-color .2s, color .2s, background .2s;
}
.btn-secondary:hover {
  border-color:var(--accent); color:var(--accent);
  background:oklch(from var(--accent) l c h / .05);
}
.btn-secondary svg { width:15px; height:15px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

/* QR + Info */
.qr-row {
  display:flex; align-items:center; gap:clamp(12px,1.5vw,20px);
  padding:clamp(10px,1.4vh,16px) clamp(14px,1.6vw,22px);
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
}
.qr-img { width:clamp(52px,5.5vw,72px); height:clamp(52px,5.5vw,72px); flex-shrink:0; border-radius:6px; }
.qr-text { display:flex; flex-direction:column; gap:3px; }
.qr-label { font-size:clamp(8px,.65vw,10px); font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--subtle); }
.qr-hint  { font-size:clamp(10px,.82vw,13px); font-weight:500; color:var(--muted); }

/* ── ANIMATIONEN ────────────────────────────────────────────── */
@keyframes up   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fade { from{opacity:0} to{opacity:1} }

.header        { animation:up   .55s cubic-bezier(.22,1,.36,1) .05s both }
.intro         { animation:up   .6s  cubic-bezier(.22,1,.36,1) .12s both }
.proc-item:nth-child(1) { animation:up .5s cubic-bezier(.22,1,.36,1) .22s both }
.proc-item:nth-child(2) { animation:up .5s cubic-bezier(.22,1,.36,1) .30s both }
.proc-item:nth-child(3) { animation:up .5s cubic-bezier(.22,1,.36,1) .38s both }
.proc-item:nth-child(4) { animation:up .5s cubic-bezier(.22,1,.36,1) .46s both }
.footer-left   { animation:fade .4s  ease                       .55s both }

.contact-person  { animation:up   .65s cubic-bezier(.22,1,.36,1) .2s  both }
.contact-details { animation:up   .6s  cubic-bezier(.22,1,.36,1) .3s  both }
.cta-block       { animation:up   .6s  cubic-bezier(.22,1,.36,1) .4s  both }
.qr-row          { animation:up   .55s cubic-bezier(.22,1,.36,1) .5s  both }

@media (prefers-reduced-motion:reduce) {
  *{animation:none!important;opacity:1!important;transform:none!important}
}
</style>
</head>
<body>
<div class="slide">

  <!-- LINKS — PROZESS -->
  <div class="col-left">
    <div class="header">
      <img class="dev-logo" id="devLogo" src="" alt="">
      <span class="slide-num">N&#228;chste Schritte</span>
    </div>

    <div class="intro">
      <div class="eyebrow">Ihr Weg zur Wohnung</div>
      <h2 class="headline" id="headline">So geht es weiter.</h2>
    </div>

    <div class="process" id="processSteps"></div>

    <div class="footer-left">
      <span class="address" id="address">—</span>
    </div>
  </div>

  <!-- RECHTS — KONTAKT + CTA -->
  <div class="col-right">
    <div class="contact-block">

      <!-- Kontaktperson -->
      <div class="contact-person">
        <div class="contact-photo">
          <img id="contactPhotoImg" src="" alt="" style="display:none">
          <div class="contact-initials" id="contactInitials">—</div>
        </div>
        <div class="contact-info">
          <div class="contact-name"  id="contactName">—</div>
          <div class="contact-title" id="contactTitle">—</div>
        </div>
      </div>

      <!-- Kontakt-Details -->
      <div class="contact-details">
        <a class="contact-row" id="phoneRow" href="#">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.82a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          </div>
          <span class="contact-text" id="contactPhone">—</span>
        </a>
        <a class="contact-row" id="emailRow" href="#">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <span class="contact-text" id="contactEmail">—</span>
        </a>
      </div>

      <!-- CTAs -->
      <div class="cta-block">
        <a class="btn-primary" id="btnBooking" href="#" target="_blank">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Termin vereinbaren
        </a>
        <a class="btn-secondary" id="btnReservation" href="#">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
          Reservierung anfragen
        </a>
      </div>

      <!-- QR Code -->
      <div class="qr-row" id="qrRow" style="display:none">
        <img class="qr-img" id="qrImg" src="" alt="QR Code">
        <div class="qr-text">
          <span class="qr-label">Terminbuchung</span>
          <span class="qr-hint">QR-Code scannen f&#252;r direkte Terminbuchung</span>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
function getInitials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w => w[0].toUpperCase()).slice(0,2).join('');
}

function applyProject(P) {
  const r = document.documentElement;
  if (P.accent)    r.style.setProperty('--accent',     P.accent);
  if (P.accentHex) r.style.setProperty('--accent-hex', P.accentHex);

  const $ = id => document.getElementById(id);
  $('devLogo').src = P.developerLogo || '';
  $('devLogo').alt = P.developer     || '';
  $('address').textContent = P.address || '';

  const ns = P.nextSteps || {};

  // Headline
  $('headline').textContent = ns.headline || 'So geht es weiter.';

  // Prozess-Schritte
  const stepsEl = $('processSteps');
  stepsEl.innerHTML = '';
  const steps = ns.processSteps || [
    { step:'01', label:'Reservierung',  desc:'Verbindliche Reservierung mit \u20ac\u00a0' + (ns.reservationFee || '2.500') + ' Reservierungsgeb\u00fchr' },
    { step:'02', label:'Finanzierung',  desc:'Finanzierungsbest\u00e4tigung innerhalb von ' + (ns.reservationDuration || '14 Tagen') },
    { step:'03', label:'Notar',         desc:'Kaufvertrag und Beurkundung beim Notar' },
    { step:'04', label:'\u00dcbergabe', desc:'Schl\u00fcsseltermin nach Fertigstellung ' + (P.completionDate || '') },
  ];

  steps.forEach((s, i) => {
    const isFinal = i === steps.length - 1;
    const item = document.createElement('div');
    item.className = 'proc-item';
    item.innerHTML =
      '<div class="proc-left">' +
        '<div class="proc-circle' + (isFinal ? ' final' : '') + '">' +
          '<span class="proc-num">' + (s.step || String(i+1).padStart(2,'0')) + '</span>' +
        '</div>' +
        (!isFinal ? '<div class="proc-line"></div>' : '') +
      '</div>' +
      '<div class="proc-content">' +
        '<div class="proc-label">' + (s.label || '') + '</div>' +
        '<div class="proc-desc">'  + (s.desc  || '') + '</div>' +
      '</div>';
    stepsEl.appendChild(item);
  });

  // Kontaktperson
  const name  = ns.contactName  || '';
  const title = ns.contactTitle || '';
  const phone = ns.contactPhone || '';
  const email = ns.contactEmail || '';
  const photo = ns.contactPhoto || '';
  const booking = ns.bookingUrl || '';

  $('contactName').textContent  = name;
  $('contactTitle').textContent = title;
  $('contactPhone').textContent = phone;
  $('contactEmail').textContent = email;

  // Initials
  $('contactInitials').textContent = getInitials(name);

  // Foto
  if (photo) {
    const img = $('contactPhotoImg');
    img.src = photo;
    img.alt = name;
    img.style.display = 'block';
    $('contactInitials').style.display = 'none';
  }

  // Links
  if (phone) $('phoneRow').href = 'tel:' + phone.replace(/\s/g,'');
  if (email) $('emailRow').href = 'mailto:' + email;
  if (booking && !booking.includes('PLACEHOLDER')) {
    $('btnBooking').href = booking;
    // QR Code via api.qrserver.com
    const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=6&data='
                  + encodeURIComponent(booking);
    $('qrImg').src = qrUrl;
    $('qrRow').style.display = 'flex';
  }

  // Reservation CTA
  if (email) {
    $('btnReservation').href = 'mailto:' + email
      + '?subject=' + encodeURIComponent('Reservierungsanfrage ' + (P.name || ''))
      + '&body=' + encodeURIComponent('Guten Tag,\n\nich m\u00f6chte eine Wohneinheit im Projekt ' + (P.name || '') + ' reservieren.\n\nMit freundlichen Gr\u00fc\u00dfen');
  }
}

try { if (window.parent?.PROJECT) applyProject(window.parent.PROJECT); } catch(e){}
window.addEventListener('message', e => {
  if (e.data?.type === 'PROJECT_DATA') applyProject(e.data.data);
});
</script>
</body>
</html>
